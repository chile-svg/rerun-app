<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f3ee" />
  <title>RE/RΔN — COACH MODE</title>

  <!-- Tailwind via CDN (Play CDN — fine for personal/dev use) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for in-browser JSX transform -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Exercise reference image library (provided by another agent) -->
  <script src="/exercise-library.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    html, body, #root {
      height: 100%;
      background: #f5f3ee;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      margin: 0;
    }
    body {
      font-family: '"Space Grotesk"', system-ui, sans-serif;
      color: #0a0a0a;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    button, .no-select { user-select: none; -webkit-user-select: none; }

    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px; background: #f5f3ee; color: #0a0a0a;
      font-family: system-ui, sans-serif;
    }
    #boot .label {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(10,10,10,0.5);
    }
    #boot .barwrap { width: 200px; height: 3px; background: rgba(10,10,10,0.1); position: relative; overflow: hidden; }
    #boot .bar { position: absolute; top: 0; bottom: 0; width: 40%; background: #0a0a0a; animation: bootslide 1.2s ease-in-out infinite; }
    @keyframes bootslide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    .ci {
      width: 100%;
      background: #f5f3ee;
      border: 1.5px solid #0a0a0a;
      border-radius: 0;
      padding: 0.6rem 0.75rem;
      font-size: 0.875rem;
      color: #0a0a0a;
      font-family: "Space Grotesk", sans-serif;
    }
    .ci::placeholder { color: rgba(10,10,10,0.35); }
    .ci:focus { outline: none; border-color: #c8202b; box-shadow: inset 0 0 0 1px #c8202b; }
    select.ci { appearance: none; background-image: linear-gradient(45deg, transparent 50%, #0a0a0a 50%), linear-gradient(135deg, #0a0a0a 50%, transparent 50%); background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 2rem; }
    .label-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 700; }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot">
      <div style="font-family:'Anton',sans-serif;font-size:42px;letter-spacing:0.04em;">COACH MODE</div>
      <div class="label">— LOADING —</div>
      <div class="barwrap"><div class="bar"></div></div>
    </div>
  </div>

  <script>
    window.__ICONS__ = {
      Plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
      Trash2: '<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
      Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      Search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      Sparkles: '<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>',
      ChevronLeft: '<path d="m15 18-6-6 6-6"/>',
      ChevronRight: '<path d="m9 18 6-6-6-6"/>',
      Copy: '<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
      Image: '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',
      RefreshCw: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>',
      Upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
    };
  </script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo, useRef, useEffect, useCallback } = React;

    // ----- Inline Icon component -----
    function Icon({ name, size = 16, className = '', fill, strokeWidth = 2, style, ...rest }) {
      const path = window.__ICONS__[name];
      if (!path) return React.createElement('span', { style: { display: 'inline-block', width: size, height: size } });
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg', width: size, height: size, viewBox: '0 0 24 24',
        fill: fill || 'none', stroke: 'currentColor', strokeWidth, strokeLinecap: 'round',
        strokeLinejoin: 'round', className, style: style || {}, ...rest,
        dangerouslySetInnerHTML: { __html: path },
      });
    }

    // ----- Date helpers -----
    const pad = (n) => String(n).padStart(2, '0');
    const toIso = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    const fmtDate = (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
    const addDays = (s, n) => { const d = fmtDate(s); d.setDate(d.getDate() + n); return toIso(d); };
    const isoToday = () => toIso(new Date());
    // Default "week starting" = the upcoming Monday. Per spec, today 2026-06-01 (a Monday)
    // should default to 2026-06-08, so when today is already Monday we jump a full week.
    // JS getDay: 0=Sun..6=Sat; we treat Mon (1) as the week start.
    function nextMonday(s) {
      const d = fmtDate(s);
      const dow = d.getDay(); // 0=Sun..6=Sat
      const offset = (dow === 0) ? 1 : (8 - dow); // Sun->+1, Mon->+7, Tue->+6 ... Sat->+2
      d.setDate(d.getDate() + offset);
      return toIso(d);
    }
    const prettyDate = (s) => fmtDate(s).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

    // Mon=0 .. Sun=6 ordering for the week.
    const WEEKDAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const WEEKDAY_SHORT = { Monday: 'Mon', Tuesday: 'Tue', Wednesday: 'Wed', Thursday: 'Thu', Friday: 'Fri', Saturday: 'Sat', Sunday: 'Sun' };
    const UNASSIGNED = 'Unassigned';
    // Normalize a parsed day string to a canonical weekday or '' .
    function normalizeDay(raw) {
      if (!raw) return '';
      const t = String(raw).trim().toLowerCase();
      const map = {
        mon: 'Monday', monday: 'Monday',
        tue: 'Tuesday', tues: 'Tuesday', tuesday: 'Tuesday',
        wed: 'Wednesday', weds: 'Wednesday', wednesday: 'Wednesday',
        thu: 'Thursday', thur: 'Thursday', thurs: 'Thursday', thursday: 'Thursday',
        fri: 'Friday', friday: 'Friday',
        sat: 'Saturday', saturday: 'Saturday',
        sun: 'Sunday', sunday: 'Sunday',
      };
      return map[t] || (WEEKDAYS.includes(raw) ? raw : '');
    }

    // ----- YouTube helpers (mirrors index.html) -----
    function youtubeId(input) {
      if (!input) return null;
      const s = String(input).trim();
      if (/^[A-Za-z0-9_-]{11}$/.test(s)) return s;
      const patterns = [
        /[?&]v=([A-Za-z0-9_-]{11})/,
        /youtu\.be\/([A-Za-z0-9_-]{11})/,
        /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
        /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
      ];
      for (const p of patterns) { const m = s.match(p); if (m) return m[1]; }
      return null;
    }

    // ----- Exercise library bridge (wait for ready, with timeout) -----
    async function libReady() {
      const lib = window.ExerciseLibrary;
      if (!lib) return null;
      try {
        if (lib.ready && typeof lib.ready.then === 'function') {
          await Promise.race([lib.ready, new Promise((res) => setTimeout(res, 4000))]);
        }
      } catch (_) { /* ignore */ }
      return window.ExerciseLibrary;
    }
    async function matchExercise(name) {
      if (!name || !name.trim()) return null;
      const lib = await libReady();
      if (!lib || typeof lib.match !== 'function') return null;
      try { return lib.match(name) || null; } catch (_) { return null; }
    }
    async function searchExercise(query, limit = 8) {
      const lib = await libReady();
      if (!lib || typeof lib.search !== 'function') return [];
      try { return lib.search(query, limit) || []; } catch (_) { return []; }
    }

    // ----- Athlete history extraction -----
    // Walk a full plan-JSON backup and collapse it into a per-movement history map.
    // For each movement (keyed by lowercased trimmed name) we keep the most-recent
    // non-empty curated data (cues/image/video/sets/reps/weight/notes), backfilling
    // still-empty image/video/cues from older sessions, and count timesSeen.
    function extractHistory(plan) {
      const byName = {};
      const days = (plan && Array.isArray(plan.days)) ? plan.days : [];
      let minDate = '', maxDate = '';
      let sessions = 0;
      // Feedback-loop accounting (#3).
      let sessionsCompleted = 0;          // sessions explicitly marked completed
      let sessionsWithStatus = 0;         // sessions that carried a completed flag at all
      let exercisesPrescribed = 0;        // total per-exercise instances seen
      let exercisesDone = 0;              // per-exercise instances marked done
      const feedbackEntries = [];         // { date, feedback }
      days.forEach((day) => {
        if (!day || typeof day !== 'object') return;
        sessions++;
        const date = typeof day.date === 'string' ? day.date : '';
        if (date) {
          if (!minDate || date < minDate) minDate = date;
          if (!maxDate || date > maxDate) maxDate = date;
        }

        // Session-level completion + feedback.
        const hasCompleted = (typeof day.completed === 'boolean');
        const completed = day.completed === true;
        if (hasCompleted) { sessionsWithStatus++; if (completed) sessionsCompleted++; }
        const feedback = typeof day.feedback === 'string' ? day.feedback.trim() : '';
        if (feedback) feedbackEntries.push({ date, feedback });

        // Per-exercise completion / notes maps (name -> bool / string).
        const exerciseDone = (day.exerciseDone && typeof day.exerciseDone === 'object') ? day.exerciseDone : {};
        const exerciseNotes = (day.exerciseNotes && typeof day.exerciseNotes === 'object') ? day.exerciseNotes : {};
        const doneByKey = {};
        const fbByKey = {};
        Object.keys(exerciseDone).forEach((k) => { doneByKey[String(k).trim().toLowerCase()] = !!exerciseDone[k]; });
        Object.keys(exerciseNotes).forEach((k) => { fbByKey[String(k).trim().toLowerCase()] = String(exerciseNotes[k] || '').trim(); });

        const exs = Array.isArray(day.exercises) ? day.exercises : [];
        exs.forEach((ex) => {
          if (!ex || typeof ex !== 'object') return;
          const rawName = String(ex.name || '').trim();
          if (!rawName) return;
          const key = rawName.toLowerCase();
          const cues = Array.isArray(ex.cues) ? ex.cues.map((c) => String(c).trim()).filter(Boolean) : [];
          const image = typeof ex.image === 'string' ? ex.image.trim() : '';
          const video = typeof ex.video === 'string' ? ex.video.trim() : '';
          const sets = (ex.sets === 0 || ex.sets) ? String(ex.sets) : '';
          const reps = (ex.reps === 0 || ex.reps) ? String(ex.reps) : '';
          const weight = (ex.weight === 0 || ex.weight) ? String(ex.weight) : '';
          const notes = typeof ex.notes === 'string' ? ex.notes.trim() : '';

          // Per-exercise completion: prefer the day's exerciseDone map, fall back
          // to an inline ex.done flag, else inherit the session's completed flag.
          let exDone;
          if (key in doneByKey) exDone = doneByKey[key];
          else if (typeof ex.done === 'boolean') exDone = ex.done;
          else if (hasCompleted) exDone = completed;
          else exDone = undefined;
          const exFeedback = fbByKey[key] || '';

          exercisesPrescribed++;
          if (exDone === true) exercisesDone++;

          let rec = byName[key];
          if (!rec) {
            rec = { name: rawName, cues: [], image: '', video: '', sets: '', reps: '', weight: '', notes: '', lastDate: '', timesSeen: 0, doneCount: 0, lastDoneDate: '', lastFeedback: '' };
            byName[key] = rec;
          }
          rec.timesSeen++;
          if (exDone === true) { rec.doneCount++; if (date && (!rec.lastDoneDate || date >= rec.lastDoneDate)) rec.lastDoneDate = date; }

          // Is this entry at least as recent as what we've recorded? (more recent wins)
          const isNewer = date && (!rec.lastDate || date >= rec.lastDate);
          if (isNewer) {
            rec.lastDate = date || rec.lastDate;
            rec.name = rawName; // freshest display name
            if (cues.length) rec.cues = cues;
            if (image) rec.image = image;
            if (video) rec.video = video;
            if (sets) rec.sets = sets;
            if (reps) rec.reps = reps;
            if (weight) rec.weight = weight;
            if (notes) rec.notes = notes;
            if (exFeedback) rec.lastFeedback = exFeedback;
          }
          // Backfill anything still empty from any (older) entry.
          if (!rec.cues.length && cues.length) rec.cues = cues;
          if (!rec.image && image) rec.image = image;
          if (!rec.video && video) rec.video = video;
          if (!rec.sets && sets) rec.sets = sets;
          if (!rec.reps && reps) rec.reps = reps;
          if (!rec.weight && weight) rec.weight = weight;
          if (!rec.notes && notes) rec.notes = notes;
          if (!rec.lastFeedback && exFeedback) rec.lastFeedback = exFeedback;
        });
      });
      const movements = Object.keys(byName).length;
      const range = (minDate && maxDate) ? `${minDate} → ${maxDate}` : (minDate || maxDate || '');

      // Adherence: prefer session-level completion when present, else exercises done / prescribed.
      let adherence = null;
      if (sessionsWithStatus > 0) adherence = Math.round((sessionsCompleted / sessionsWithStatus) * 100);
      else if (exercisesPrescribed > 0 && exercisesDone > 0) adherence = Math.round((exercisesDone / exercisesPrescribed) * 100);

      // Most-recent non-empty session feedback (last ~5), newest first.
      const recentFeedback = feedbackEntries
        .filter((f) => f.feedback)
        .sort((a, b) => String(a.date || '').localeCompare(String(b.date || '')))
        .slice(-5)
        .reverse();

      // Movements often skipped: seen ≥2× but done <50% of the time.
      const oftenSkipped = Object.values(byName)
        .filter((r) => r.timesSeen >= 2 && r.doneCount / r.timesSeen < 0.5)
        .sort((a, b) => (a.doneCount / a.timesSeen) - (b.doneCount / b.timesSeen))
        .map((r) => r.name);

      return {
        byName,
        meta: {
          movements, sessions, range,
          adherence,
          sessionsCompleted, sessionsWithStatus,
          exercisesDone, exercisesPrescribed,
          recentFeedback, oftenSkipped,
        },
      };
    }

    const HISTORY_KEY = 'coach_athlete_history_v1';

    // ----- IDs -----
    let _idc = 0;
    const newId = () => `ex_${Date.now()}_${++_idc}`;

    // ====================================================================
    // Reference image block for one exercise (with "change image" picker)
    // ====================================================================
    function ReferenceImage({ name, imageUrl, onPick }) {
      const [imgFailed, setImgFailed] = useState(false);
      const [picking, setPicking] = useState(false);
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);
      const [q, setQ] = useState(name || '');
      const [customUrl, setCustomUrl] = useState('');

      useEffect(() => { setImgFailed(false); }, [imageUrl]);

      const runSearch = useCallback(async (query) => {
        setSearching(true);
        const r = await searchExercise(query || name, 8);
        setResults(r);
        setSearching(false);
      }, [name]);

      const openPicker = () => { setPicking(true); setQ(name || ''); runSearch(name || ''); };
      const showImage = imageUrl && !imgFailed;

      return (
        <div className="space-y-1.5">
          <div className="flex items-center justify-between">
            <p className="label-mono text-[#0a0a0a]/50">— Reference —</p>
            <button onClick={openPicker} className="label-mono text-[#c8202b] flex items-center gap-1 active:scale-95 transition">
              <Icon name="Image" size={11} /> Change image
            </button>
          </div>
          {showImage ? (
            <div className="border-2 border-[#0a0a0a] bg-[#e8e4d9] overflow-hidden">
              <img src={imageUrl} alt={`${name} reference`} className="w-full h-auto block max-h-64 object-contain mx-auto" onError={() => setImgFailed(true)} />
            </div>
          ) : (
            <div className="border-2 border-dashed border-[#0a0a0a]/40 bg-[#e8e4d9]/50 px-3 py-6 text-center">
              <p className="text-xs text-[#0a0a0a]/50">No reference image — use the video below.</p>
            </div>
          )}

          {picking && (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-2 bg-[#0a0a0a]/60 backdrop-blur-sm" onClick={() => setPicking(false)}>
              <div className="w-full max-w-md max-h-[90vh] overflow-y-auto bg-[#f5f3ee] border-2 border-[#0a0a0a] shadow-2xl" onClick={(e) => e.stopPropagation()}>
                <div className="sticky top-0 z-10 flex items-stretch bg-[#0a0a0a] text-[#f5f3ee] border-b-2 border-[#0a0a0a]">
                  <h3 className="flex-1 px-4 py-3 text-sm uppercase font-bold" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.15em' }}>Pick a reference image</h3>
                  <button onClick={() => setPicking(false)} className="px-4 hover:bg-[#c8202b] active:scale-95 transition border-l-2 border-[#f5f3ee]/20"><Icon name="X" size={18} /></button>
                </div>
                <div className="p-4 space-y-3">
                  <form onSubmit={(e) => { e.preventDefault(); runSearch(q); }} className="flex gap-2">
                    <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search the image library (try a simpler name)…" className="ci flex-1" />
                    <button type="submit" className="px-3 bg-[#0a0a0a] text-[#f5f3ee] active:scale-95 transition"><Icon name="Search" size={16} /></button>
                  </form>
                  {searching && <p className="label-mono text-[#0a0a0a]/50">Searching…</p>}
                  {!searching && results.length === 0 && (
                    <p className="text-xs text-[#0a0a0a]/50 leading-snug">No matches in the open exercise library for that term. Try a simpler/more common name above (e.g. “calf raise”, “split squat”), or paste a direct image URL below.</p>
                  )}
                  <div className="grid grid-cols-2 gap-2">
                    {results.map((r, i) => (
                      <button key={i} onClick={() => { onPick(r); setPicking(false); }} className="border-2 border-[#0a0a0a] bg-[#e8e4d9] text-left active:scale-[0.98] transition overflow-hidden">
                        {r.imageUrl
                          ? <img src={r.imageUrl} alt={r.name} className="w-full h-24 object-contain" />
                          : <div className="w-full h-24 flex items-center justify-center text-[#0a0a0a]/30"><Icon name="Image" size={24} /></div>}
                        <p className="px-2 py-1.5 text-[11px] font-semibold leading-tight border-t-2 border-[#0a0a0a]">{r.name}</p>
                      </button>
                    ))}
                  </div>
                  <div className="border-t-2 border-[#0a0a0a]/10 pt-3 space-y-1.5">
                    <p className="label-mono text-[#0a0a0a]/50">Or paste an image URL</p>
                    <form onSubmit={(e) => { e.preventDefault(); const u = customUrl.trim(); if (u) { onPick({ name, imageUrl: u }); setPicking(false); } }} className="flex gap-2">
                      <input value={customUrl} onChange={(e) => setCustomUrl(e.target.value)} placeholder="https://…/photo.jpg" className="ci flex-1" />
                      <button type="submit" className="px-3 bg-[#c8202b] text-[#f5f3ee] active:scale-95 transition label-mono">Use</button>
                    </form>
                    {imageUrl && (
                      <button onClick={() => { onPick({ name, imageUrl: '' }); setPicking(false); }} className="label-mono text-[#0a0a0a]/50 active:scale-95 transition">Remove current image</button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ====================================================================
    // Reference image CAROUSEL for one exercise.
    // Candidates merged (dedup by URL) in priority order:
    //   1) ranked images from /api/enrich (passed via enrichImages, best-first)
    //   2) client fallback from the exercise library (searchExercise)
    // Navigating selects the shown image as the reference (imageUrl + imageAuto false).
    // ====================================================================
    function ImageCarousel({ name, imageUrl, imageAuto, enrichImages, pending, onChange }) {
      const [clientImages, setClientImages] = useState([]); // urls from the library
      const [broken, setBroken] = useState({}); // url -> true when <img> errored
      const [idx, setIdx] = useState(0);
      const [pasteUrl, setPasteUrl] = useState('');

      // Load client-fallback images whenever the name changes.
      useEffect(() => {
        let cancelled = false;
        (async () => {
          const matches = await searchExercise(name || '', 8);
          if (cancelled) return;
          const urls = [];
          for (const m of (matches || [])) {
            if (m && m.imageUrl) urls.push(String(m.imageUrl));
            if (m && m.secondaryImageUrl) urls.push(String(m.secondaryImageUrl));
          }
          setClientImages(urls);
        })();
        return () => { cancelled = true; };
      }, [name]);

      // Merge candidates, dedup by URL, drop broken/empty. Priority order:
      //   0) the currently-selected imageUrl (pasted URL or reused history image)
      //   1) ranked images from /api/enrich
      //   2) client fallback from the exercise library
      // Prepending the current imageUrl ensures a pasted/history image always
      // shows and stays selected even if it isn't in the enrich/library lists.
      const candidates = useMemo(() => {
        const seen = new Set();
        const out = [];
        const push = (u) => {
          const url = (u || '').trim();
          if (!url || seen.has(url) || broken[url]) return;
          seen.add(url); out.push(url);
        };
        push(imageUrl);
        (enrichImages || []).forEach(push);
        clientImages.forEach(push);
        return out;
      }, [imageUrl, enrichImages, clientImages, broken]);

      // Keep idx in range. When candidates shift, default to the currently
      // selected imageUrl if it's still present, else the first (top pick).
      useEffect(() => {
        if (candidates.length === 0) { if (idx !== 0) setIdx(0); return; }
        const cur = (imageUrl || '').trim();
        const found = cur ? candidates.indexOf(cur) : -1;
        if (found >= 0) { if (found !== idx) setIdx(found); }
        else if (idx >= candidates.length) { setIdx(0); }
      }, [candidates]);

      // Default selection: when auto and we have candidates, point imageUrl at
      // the top pick so the export carries it without manual navigation.
      useEffect(() => {
        if (imageAuto !== false && candidates.length) {
          const top = candidates[0];
          if (top && top !== (imageUrl || '').trim()) {
            onChange({ imageUrl: top, imageAuto: true });
          }
        }
        // eslint-disable-next-line
      }, [candidates]);

      const go = (next) => {
        if (!candidates.length) return;
        const n = (next + candidates.length) % candidates.length;
        setIdx(n);
        // Manual navigation pins the choice so enrich won't overwrite it.
        onChange({ imageUrl: candidates[n], imageAuto: false });
      };

      const current = candidates[idx] || '';
      const total = candidates.length;

      return (
        <div className="space-y-1.5">
          <div className="flex items-center justify-between">
            <p className="label-mono text-[#0a0a0a]/50">— Reference —</p>
            {pending && !(enrichImages && enrichImages.length) && (
              <span className="flex items-center gap-1 label-mono text-[#0a0a0a]/40"><Icon name="RefreshCw" size={10} className="animate-spin" /> finding best image…</span>
            )}
          </div>
          {total > 0 ? (
            <div className="space-y-1.5">
              <div className="relative border-2 border-[#0a0a0a] bg-[#e8e4d9] overflow-hidden">
                <img
                  key={current}
                  src={current}
                  alt={`${name} reference`}
                  className="w-full h-auto block max-h-64 object-contain mx-auto"
                  onError={() => setBroken((b) => ({ ...b, [current]: true }))}
                />
                {total > 1 && (
                  <>
                    <button type="button" onClick={() => go(idx - 1)}
                      className="absolute left-1 top-1/2 -translate-y-1/2 bg-[#0a0a0a] text-[#f5f3ee] border-2 border-[#0a0a0a] px-1.5 py-2 active:scale-95 transition" aria-label="Previous image">
                      <Icon name="ChevronLeft" size={16} />
                    </button>
                    <button type="button" onClick={() => go(idx + 1)}
                      className="absolute right-1 top-1/2 -translate-y-1/2 bg-[#0a0a0a] text-[#f5f3ee] border-2 border-[#0a0a0a] px-1.5 py-2 active:scale-95 transition" aria-label="Next image">
                      <Icon name="ChevronRight" size={16} />
                    </button>
                    <span className="absolute bottom-1 right-1 bg-[#0a0a0a]/80 text-[#f5f3ee] label-mono px-1.5 py-0.5">{idx + 1} / {total}</span>
                  </>
                )}
              </div>
            </div>
          ) : (
            <div className="border-2 border-dashed border-[#0a0a0a]/40 bg-[#e8e4d9]/50 px-3 py-6 text-center">
              <p className="text-xs text-[#0a0a0a]/50">No reference image — use the video below.</p>
            </div>
          )}
          <form onSubmit={(e) => { e.preventDefault(); const u = pasteUrl.trim(); if (u) { onChange({ imageUrl: u, imageAuto: false }); setPasteUrl(''); } }} className="flex gap-2">
            <input value={pasteUrl} onChange={(e) => setPasteUrl(e.target.value)} placeholder="Paste image URL" className="ci flex-1" />
            <button type="submit" className="px-3 bg-[#c8202b] text-[#f5f3ee] active:scale-95 transition label-mono border-2 border-[#c8202b]">Use</button>
          </form>
        </div>
      );
    }

    // ====================================================================

    function CuesEditor({ cues, onChange }) {
      const list = Array.isArray(cues) ? cues : [];
      const setAt = (i, v) => { const next = list.slice(); next[i] = v; onChange({ cues: next }); };
      const removeAt = (i) => { const next = list.slice(); next.splice(i, 1); onChange({ cues: next }); };
      const add = () => onChange({ cues: [...list, ''] });
      return (
        <div className="space-y-1.5">
          <p className="label-mono text-[#0a0a0a]/50">Coaching cues</p>
          <div className="space-y-1.5">

              <div key={i} className="flex gap-2">
                <input value={c} onChange={(e) => setAt(i, e.target.value)} placeholder="e.g. Brace before you descend" className="ci flex-1" />
                <button type="button" onClick={() => removeAt(i)} className="px-3 border-2 border-[#0a0a0a] bg-[#e8e4d9] active:scale-95 transition" title="Remove cue" aria-label="Remove cue">

    // ====================================================================
    // YouTube reference block for one exercise
    // ====================================================================
    function VideoRef({ name, video, videoAuto, onChange }) {
      const query = `${name || ''} exercise form tutorial`.trim();
      const ytSearch = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
      const pinnedId = youtubeId(video);
      const [results, setResults] = useState([]);
      const [idx, setIdx] = useState(0);
      const [status, setStatus] = useState('idle'); // idle|loading|ok|empty|unavailable|error
      const [picking, setPicking] = useState(false);

      // Fetch embeddable results for the exercise name (debounced). We always
      // fetch so "swap" has options; we only auto-fill the export's video while
      // the coach hasn't manually pinned/swapped (videoAuto stays true).
      // EXCEPTION: when a video is already pinned AND it was set manually or reused
      // from athlete history (videoAuto === false), skip the search entirely —
      // just embed the curated clip. This saves quota and respects the choice.
      useEffect(() => {
        if (pinnedId && videoAuto === false) { setStatus('ok'); setResults([]); return; }
        if (!name || !name.trim()) { setStatus('idle'); setResults([]); return; }
        let cancelled = false;
        setStatus('loading');
        const t = setTimeout(async () => {
          try {
            const r = await fetch(`/api/youtube?q=${encodeURIComponent(query)}`);
            const data = await r.json().catch(() => ({}));
            if (cancelled) return;
            if (!r.ok) { setStatus(r.status === 503 ? 'unavailable' : 'error'); return; }
            const list = (data.results || []).filter((x) => x && x.videoId);
            if (!list.length) { setStatus('empty'); return; }
            setResults(list); setIdx(0); setStatus('ok');
            if (videoAuto !== false) {
              onChange({ video: `https://youtu.be/${list[0].videoId}`, videoAuto: true });
            }
          } catch (e) { if (!cancelled) setStatus('error'); }
        }, 500);
        return () => { cancelled = true; clearTimeout(t); };
        // eslint-disable-next-line
      }, [name, pinnedId, videoAuto]);

      // A manual pin/selection wins; otherwise embed the current search result.
      const currentId = pinnedId || (results[idx] && results[idx].videoId) || null;
      const current = results[idx];

      const selectResult = (i) => {
        const v = results[i];
        if (!v) return;
        setIdx(i);
        onChange({ video: `https://youtu.be/${v.videoId}`, videoAuto: false });
        setPicking(false);

      return (
        <div className="space-y-1.5">
          <div className="flex items-center justify-between">
            <p className="label-mono text-[#0a0a0a]/50">— Video reference —</p>
            {results.length > 1 && (

                <Icon name="RefreshCw" size={11} /> Swap clip
              </button>
            )}
          </div>

          {currentId ? (
            <div className="border-2 border-[#0a0a0a] bg-[#0a0a0a] overflow-hidden aspect-video">
              <iframe key={currentId} src={`https://www.youtube-nocookie.com/embed/${currentId}?rel=0`} className="w-full h-full"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen title={`${name} video`} />
            </div>
          ) : (
            <a href={ytSearch} target="_blank" rel="noreferrer" className="flex flex-col items-center justify-center gap-2 border-2 border-dashed border-[#0a0a0a]/40 bg-[#e8e4d9]/60 aspect-video text-center px-5 active:scale-[0.99] transition">
              <Icon name="Search" size={26} className="text-[#c8202b]" />
              <p className="text-xs text-[#0a0a0a]/60 leading-snug">
                {status === 'loading' ? 'Finding a clip…'
                  : status === 'unavailable' ? <>In-app video search is off. Tap to search YouTube for <span className="font-semibold">“{name}”</span>, then paste a link below.</>
                  : status === 'empty' ? <>No clip found. Tap to search YouTube for <span className="font-semibold">“{name}”</span>.</>
                  : status === 'error' ? 'Could not load video search. Tap to open YouTube, or paste a link below.'
                  : <>Tap to search YouTube for <span className="font-semibold">“{name || 'this movement'}”</span>.</>}
              </p>
            </a>
          )}

          {currentId && !pinnedId && current && (
            <p className="text-[11px] text-[#0a0a0a]/50 leading-snug truncate">▶ {current.title}</p>
          )}

          <input value={video || ''} onChange={(e) => onChange({ video: e.target.value, videoAuto: false })} placeholder="Or paste a YouTube link to pin" className="ci" />
          <a href={ytSearch} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 w-full px-3 py-2 bg-[#c8202b] text-[#f5f3ee] active:scale-[0.98] transition label-mono border-2 border-[#c8202b]">
            <Icon name="Search" size={12} /> Open on YouTube
          </a>

          {picking && (
            <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-2 bg-[#0a0a0a]/60 backdrop-blur-sm" onClick={() => setPicking(false)}>
              <div className="w-full max-w-md max-h-[90vh] overflow-y-auto bg-[#f5f3ee] border-2 border-[#0a0a0a] shadow-2xl" onClick={(e) => e.stopPropagation()}>
                <div className="sticky top-0 z-10 flex items-stretch bg-[#0a0a0a] text-[#f5f3ee] border-b-2 border-[#0a0a0a]">
                  <h3 className="flex-1 px-4 py-3 text-sm uppercase font-bold" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.15em' }}>Pick a clip</h3>
                  <button onClick={() => setPicking(false)} className="px-4 hover:bg-[#c8202b] active:scale-95 transition border-l-2 border-[#f5f3ee]/20"><Icon name="X" size={18} /></button>
                </div>
                <div className="p-3 space-y-2">
                  {results.map((r, i) => (
                    <button key={r.videoId} onClick={() => selectResult(i)} className={`w-full flex gap-2 border-2 ${i === idx ? 'border-[#c8202b]' : 'border-[#0a0a0a]'} bg-[#e8e4d9] text-left active:scale-[0.99] transition overflow-hidden`}>
                      {r.thumbnail

                        : <div className="w-28 h-16 flex items-center justify-center text-[#0a0a0a]/30"><Icon name="Image" size={20} /></div>}

                    <Icon name="Search" size={12} /> Find more on YouTube
                  </a>
                </div>
              </div>
            </div>
          )}
        </div>
      );
