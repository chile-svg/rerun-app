    // ====================================================================
    // Frequency → dates (#2). Given a frequency string, the week start and the
    // exercise's assigned date, return the list of ISO dates it should land on.
    //   blank / once / weekly / 2x daily / unmatched → [assignedDate]
    //   daily (not 2x / not every other)             → all 7 days
    //   every other / alternate / eod                → offsets [0,2,4,6]
    //   N per week (3x/week, 3 x week, 2x week)       → spread N over the week
    // ====================================================================
    function frequencyDates(frequency, weekStart, assignedDate) {
      const base = assignedDate || weekStart;
      const f = String(frequency || '').trim().toLowerCase();
      if (!f) return [base];
      const week = (offs) => offs.map((o) => addDays(weekStart, o));

      // "2x daily" stays on its single assigned day (label travels with it).
      if (/2\s*x?\s*daily|twice\s*(a|per)?\s*day/.test(f)) return [base];
      // every other day / alternate / eod
      if (/every\s*other|alternate|eod/.test(f)) return week([0, 2, 4, 6]);
      // daily (but not the 2x/every-other cases handled above)
      if (/daily|every\s*day/.test(f)) return week([0, 1, 2, 3, 4, 5, 6]);
      // N per week, e.g. "3x/week", "3 x week", "2x week", "3 per week"
      const m = f.match(/(\d+)\s*x?\s*(?:\/|per|a)?\s*week/);
      if (m) {
        const n = parseInt(m[1], 10) || 0;
        if (n === 2) return week([0, 3]);
        if (n === 3) return week([0, 2, 4]);
        if (n >= 4) return week([0, 2, 4, 6]);
        return [base]; // 1x/week or 0 → single assigned day
      }
      return [base];
    }

    // ====================================================================
    // Build the export object from reviewed exercises
    // ====================================================================
    function buildExport(exercises, weekStart, phase) {
      // Map each exercise to a portable export shape (all rehab fields included).
      const toExport = (ex) => ({
        name: (ex.name || '').trim(),
        sets: parseInt(ex.sets, 10) || 0,
        reps: String(ex.reps || ''),
        weight: String(ex.weight || ''),
        video: youtubeId(ex.video) ? String(ex.video).trim() : (ex.video ? String(ex.video).trim() : ''),
        image: ex.imageUrl || '',
        notes: String(ex.notes || ''),
        cues: Array.isArray(ex.cues) ? ex.cues.filter(c => String(c).trim()).map(c => String(c).trim()) : [],
        rpe: String(ex.rpe || ''),
        tempo: String(ex.tempo || ''),
        side: String(ex.side || ''),
        frequency: String(ex.frequency || ''),
        equipment: String(ex.equipment || ''),
        target: String(ex.target || ''),
        painRule: String(ex.painRule || ''),
        regression: String(ex.regression || ''),
        progression: String(ex.progression || ''),
        why: String(ex.why || ''),
        cautions: String(ex.cautions || ''),
      });

      // Bucket exercises onto dates per their frequency, then group by date.
      const byDate = {};   // iso date -> exercises[]
      const dateWeekday = {}; // iso date -> weekday name ('' for Unassigned-origin)
      exercises.forEach((ex) => {
        const e = toExport(ex);
        if (!e.name) return; // skip blank cards
        const day = normalizeDay(ex.day);
        const assignedDate = day ? addDays(weekStart, WEEKDAYS.indexOf(day)) : weekStart;
        const dates = frequencyDates(ex.frequency, weekStart, assignedDate);
        dates.forEach((date) => {
          (byDate[date] = byDate[date] || []).push(e);
          // Remember the weekday that owns this date for title defaults.
          if (!(date in dateWeekday)) {
            const offset = Math.round((fmtDate(date) - fmtDate(weekStart)) / 86400000);
            dateWeekday[date] = (offset >= 0 && offset <= 6 && day) ? WEEKDAYS[offset] : (day ? day : '');
          }
        });
      });

      const days = Object.keys(byDate).map((date) => {
        const offset = Math.round((fmtDate(date) - fmtDate(weekStart)) / 86400000);
        const wd = (offset >= 0 && offset <= 6) ? WEEKDAYS[offset] : '';
        const isUnassignedOrigin = !dateWeekday[date];
        const title = isUnassignedOrigin
          ? (dayTitles[UNASSIGNED] || 'This Week')
          : (dayTitles[wd] || (wd ? `Strength — ${wd}` : 'This Week'));
        return { date, type: 'strength', title, exercises: byDate[date] };
      });
      days.sort((a, b) => a.date.localeCompare(b.date));
      return {
        days,
        meta: { generatedBy: 'coach-mode', generatedAt: new Date().toISOString(), weekStart, phase: String(phase || '') },
      };
    }
    // Holds per-day editable titles, keyed by weekday name (and UNASSIGNED). Module-scope
    // so buildExport can read them; the App keeps it in state and syncs here.
    let dayTitles = {};

    // ====================================================================
    // History review MODAL — read-only browse of the imported athlete history.
    // Same overlay style as the image/clip pickers. Lists every past movement
    // (most-recent first) with cues, a thumbnail and a video link.
    // ====================================================================
    function HistoryReview({ historyByName, meta, onClose }) {
      const records = useMemo(() => {
        return Object.values(historyByName || {}).sort((a, b) => {
          const ad = a.lastDate || '', bd = b.lastDate || '';
          if (ad !== bd) return bd.localeCompare(ad); // most-recent first
          return String(a.name || '').localeCompare(String(b.name || ''));
        });
      }, [historyByName]);
      const [broken, setBroken] = useState({});

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-2 bg-[#0a0a0a]/60 backdrop-blur-sm" onClick={onClose}>
          <div className="w-full max-w-lg max-h-[90vh] overflow-y-auto bg-[#f5f3ee] border-2 border-[#0a0a0a] shadow-2xl" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 z-10 flex items-stretch bg-[#0a0a0a] text-[#f5f3ee] border-b-2 border-[#0a0a0a]">
              <h3 className="flex-1 px-4 py-3 text-sm uppercase font-bold" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.15em' }}>History review</h3>
              <button onClick={onClose} className="px-4 hover:bg-[#c8202b] active:scale-95 transition border-l-2 border-[#f5f3ee]/20"><Icon name="X" size={18} /></button>
            </div>
            <div className="p-3 space-y-2">
              {meta && (
                <p className="label-mono text-[#0a0a0a]/50">
                  {meta.movements} movement{meta.movements === 1 ? '' : 's'}
                  {meta.sessions ? ` · ${meta.sessions} session${meta.sessions === 1 ? '' : 's'}` : ''}
                  {meta.range ? ` · ${meta.range}` : ''}
                </p>
              )}

              {/* Adherence + recent feedback (#3) */}
              {meta && (meta.adherence != null || (meta.recentFeedback && meta.recentFeedback.length)) && (
                <div className="border-2 border-[#1c2942] bg-[#e8e4d9] px-3 py-2.5 space-y-2">
                  {meta.adherence != null && (
                    <div className="flex items-baseline gap-2">
                      <span className="label-mono text-[#0a0a0a]/50">— Adherence —</span>
                      <span className="text-xl font-bold leading-none" style={{ fontFamily: '"Anton", sans-serif' }}>{meta.adherence}%</span>
                      <span className="text-[11px] text-[#0a0a0a]/50">
                        {meta.sessionsWithStatus > 0
                          ? `${meta.sessionsCompleted}/${meta.sessionsWithStatus} sessions`
                          : `${meta.exercisesDone}/${meta.exercisesPrescribed} exercises`}
                      </span>
                    </div>
                  )}
                  {meta.recentFeedback && meta.recentFeedback.length > 0 && (
                    <div className="space-y-1">
                      <p className="label-mono text-[#0a0a0a]/50">— Recent feedback —</p>
                      <ul className="space-y-1">
                        {meta.recentFeedback.map((f, i) => (
                          <li key={i} className="text-xs leading-snug text-[#0a0a0a]/80">
                            {f.date && <span className="font-mono text-[#0a0a0a]/45">{f.date} · </span>}
                            {f.feedback}
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                  {meta.oftenSkipped && meta.oftenSkipped.length > 0 && (
                    <p className="text-[11px] text-[#c8202b] leading-snug">Often skipped: {meta.oftenSkipped.slice(0, 5).join(', ')}</p>
                  )}
                </div>
              )}
              {records.length === 0 && (
                <p className="text-sm text-[#0a0a0a]/50 py-4 text-center">No movements in the imported history.</p>
              )}
              {records.map((rec, i) => {
                const showImg = rec.image && !broken[rec.image];
                return (
                  <div key={(rec.name || '') + i} className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
                    <div className="px-3 py-2 bg-[#4a3528] text-[#f5f3ee] border-b-2 border-[#0a0a0a] flex items-baseline gap-2">
                      <span className="flex-1 font-semibold leading-tight">{rec.name}</span>
                      <span className="label-mono opacity-70 whitespace-nowrap text-right">
                        trained {rec.timesSeen}×{rec.lastDate ? ` · last ${rec.lastDate}` : ''}
                        {(rec.doneCount != null) ? <><br/>done {rec.doneCount}/{rec.timesSeen}{rec.lastDoneDate ? ` · last ${rec.lastDoneDate}` : ''}</> : null}
                      </span>
                    </div>
                    <div className="p-3 space-y-2">
                      {showImg && (
                        <div className="border-2 border-[#0a0a0a] bg-[#e8e4d9] overflow-hidden inline-block max-w-[140px]">
                          <img src={rec.image} alt={`${rec.name} reference`} className="block max-h-28 w-auto object-contain" onError={() => setBroken((b) => ({ ...b, [rec.image]: true }))} />
                        </div>
                      )}
                      {Array.isArray(rec.cues) && rec.cues.length > 0 ? (
                        <ul className="list-disc pl-4 space-y-0.5">
                          {rec.cues.map((c, j) => (
                            <li key={j} className="text-sm leading-snug text-[#0a0a0a]/80">{c}</li>
                          ))}
                        </ul>
                      ) : (
                        <p className="text-xs text-[#0a0a0a]/40">No cues recorded.</p>
                      )}
                      {rec.lastFeedback && (
                        <p className="text-xs leading-snug text-[#0a0a0a]/70 border-l-2 border-[#1c2942]/40 pl-2">“{rec.lastFeedback}”</p>
                      )}
                      {rec.video && (
                        <a href={rec.video} target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 label-mono text-[#c8202b] active:scale-95 transition">
                          video ↗
                        </a>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ====================================================================
    // MAIN APP
    // ====================================================================
    function App() {
      const [screen, setScreen] = useState('input'); // input | review | export
      const [text, setText] = useState('');
      // Athlete context / anchor — injuries, level, goals, equipment. Tailors the
      // generated coaching cues. Persisted so the coach doesn't retype it weekly.
      const [context, setContext] = useState(() => { try { return localStorage.getItem('coach_athlete_context') || ''; } catch (_) { return ''; } });
      // Rehab phase (#5) — prepended to the parse context + carried into export meta.
      const [phase, setPhase] = useState(() => { try { return localStorage.getItem('coach_rehab_phase') || ''; } catch (_) { return ''; } });
      // Imported athlete history: per-movement curated cues/image/video, persisted.
      const [historyByName, setHistoryByName] = useState(() => {
        try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) { const p = JSON.parse(raw); return (p && p.byName) || {}; } } catch (_) {}
        return {};
      });
      const [historyMeta, setHistoryMeta] = useState(() => {
        try { const raw = localStorage.getItem(HISTORY_KEY); if (raw) { const p = JSON.parse(raw); return (p && p.meta) || null; } } catch (_) {}
        return null;
      });
      const [historyError, setHistoryError] = useState('');
      const [historyReviewOpen, setHistoryReviewOpen] = useState(false);
      const fileInputRef = useRef(null);
      const [weekStart, setWeekStart] = useState(nextMonday(isoToday()));
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [summary, setSummary] = useState('');
      const [exercises, setExercises] = useState([]);
      const [enrichByName, setEnrichByName] = useState({}); // lowercased name -> [ranked image urls]
      const [enrichPending, setEnrichPending] = useState(() => new Set()); // lowercased names still being ranked
      const [titles, setTitles] = useState({}); // weekday -> title
      const [copied, setCopied] = useState(false);
      const [exported, setExported] = useState(false);

      // keep module-level dayTitles in sync for buildExport
      useEffect(() => { dayTitles = titles; }, [titles]);
      useEffect(() => { try { localStorage.setItem('coach_athlete_context', context); } catch (_) {} }, [context]);
      useEffect(() => { try { localStorage.setItem('coach_rehab_phase', phase); } catch (_) {} }, [phase]);

      // Import the athlete's "Full JSON backup": parse, extract per-movement
      // history, store in state + localStorage so it survives reloads.
      const onHistoryFile = async (e) => {
        setHistoryError('');
        const file = e.target.files && e.target.files[0];
        if (file) {
          try {
            const txt = await file.text();
            const plan = JSON.parse(txt);
            const { byName, meta } = extractHistory(plan);
            if (!meta.movements) {
              setHistoryError('No exercises found in that file. Make sure it is the athlete’s Full JSON backup.');
            } else {
              setHistoryByName(byName);
              setHistoryMeta(meta);
              try { localStorage.setItem(HISTORY_KEY, JSON.stringify({ byName, meta })); } catch (_) {}
            }
          } catch (_) {
            setHistoryError('That file isn’t valid JSON. Export the athlete’s Full JSON backup and try again.');
          }
        }
        // reset so picking the same file again re-fires change
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      const clearHistory = () => {
        if (!window.confirm('Clear the imported athlete history? Past cues, images and videos will no longer be reused.')) return;
        setHistoryByName({});
        setHistoryMeta(null);
        setHistoryReviewOpen(false);
        setHistoryError('');
        try { localStorage.removeItem(HISTORY_KEY); } catch (_) {}
      };

      // --- Optional shared-passphrase gate (server-enforced) ---
      const [gateRequired, setGateRequired] = useState(false);
      const [pass, setPass] = useState(() => { try { return localStorage.getItem('coach_pass') || ''; } catch (_) { return ''; } });
      const [gateOpen, setGateOpen] = useState(false);
      const [passInput, setPassInput] = useState('');
      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const r = await fetch('/api/coach-config');
            const cfg = await r.json().catch(() => ({}));
            if (cancelled) return;
            if (cfg && cfg.requiresPasscode) {
              setGateRequired(true);
              if (!pass) setGateOpen(true);
            }
          } catch (_) { /* if config can't load, don't block; parse will gate anyway */ }
        })();
        return () => { cancelled = true; };
        // eslint-disable-next-line
      }, []);
      const submitGate = (e) => {
        if (e) e.preventDefault();
        const v = passInput.trim();
        if (!v) return;
        try { localStorage.setItem('coach_pass', v); } catch (_) {}
        setPass(v);
        setPassInput('');
        setGateOpen(false);
        setError('');
      };

      const examples = [
        'Monday: Back squat 4x8 @80kg, RDL 3x8, Walking lunge 3x12 each leg / 30s plank x3',
        'Tue upper: bench 5x5 @60kg, pull-ups 4xAMRAP, db row 3x10. Thu: deadlift 3x5, front squat 3x6',
        'push day - incline db press 4x10, lateral raise 3x15, tricep pushdown 3x12',
      ];

      // ---- Protocol templates (#4) — short, editable physio starting points ----
      const templates = [
        {
          label: 'Achilles tendinopathy (HSR)',
          phase: 'Load tolerance',
          context: 'Mid-portion Achilles tendinopathy, pain settling; goal: rebuild tendon load tolerance.',
          text: 'Mon: Heavy slow calf raise 4x6 tempo 3-0-3, Seated calf raise 4x8 tempo 3-0-3, Single-leg balance 3x30s\nThu: Heavy slow calf raise 4x6 tempo 3-0-3, Eccentric heel drop 3x12, Hop progression 3x10',
        },
        {
          label: 'Patellofemoral pain',
          phase: 'Load tolerance',
          context: 'Anterior knee pain with stairs/squats; goal: quad/hip strength, settle PFP.',
          text: 'Mon: Spanish squat 4x10 tempo 3-0-1, Leg press 3x12, Side-lying hip abduction 3x15 each\nThu: Step-down 3x10 each leg, Wall sit 3x40s, Glute bridge 3x15',
        },
        {
          label: 'Rotator cuff / shoulder',
          phase: 'Acute / protect',
          context: 'Rotator cuff related shoulder pain; goal: restore cuff control, pain-free range.',
          text: 'Daily: Isometric external rotation 5x30s, Scapular setting 3x10\nMon: Banded external rotation 3x15, Banded internal rotation 3x15, Scaption raise 3x12',
        },
        {
          label: 'ACL — early strength',
          phase: 'Load tolerance',
          context: 'Post ACL reconstruction, early strength phase; goal: quad activation, single-leg control.',
          text: 'Mon: Leg press 4x10, Hamstring curl 3x12, Single-leg balance 3x30s, Heel raise 3x15\nThu: Spanish squat 3x12, Step-up 3x10 each leg, Terminal knee extension 3x15',
        },
        {
          label: 'Low back',
          phase: 'Load tolerance',
          context: 'Non-specific low back pain, settling; goal: build trunk and hip tolerance.',
          text: 'Mon: Hip hinge / RDL 3x10 tempo 3-0-1, Bird dog 3x8 each, Dead bug 3x10, Side plank 3x30s each\nThu: Goblet squat 3x10, Glute bridge 3x15, McGill curl-up 3x8',
        },
      ];
      const applyTemplate = (tpl) => {
        setText(tpl.text);
        if (tpl.phase) setPhase(tpl.phase);
        if (tpl.context) setContext((c) => (c && c.trim()) ? c : tpl.context);
      };

      const process = async () => {
        const t = text.trim();
        if (!t) { setError('Type what the athlete should do first.'); return; }
        setLoading(true); setError('');
        try {
          // Build a history-context string from up to ~40 past movements that have
          // established cues, so the model reuses consistent cueing.
          const historyCueLines = Object.values(historyByName)
            .filter((h) => h && Array.isArray(h.cues) && h.cues.length)
            .slice(0, 40)
            .map((h) => `- ${h.name}: ${h.cues.join('; ')}`);
          const historyContextString = historyCueLines.length
            ? `The athlete has trained these movements before, with these established coaching cues. Reuse consistent cueing for the same movement where appropriate:\n${historyCueLines.join('\n')}`
            : '';

          // Rehab phase line (#5).
          const phaseLine = phase ? `Rehab phase: ${phase}` : '';

          // Athlete-response summary (#3): adherence, last few feedback notes,
          // and movements often skipped — so new cues/pain-rules/progressions can
          // reference how the athlete has actually been responding.
          let athleteResponseString = '';
          if (historyMeta) {
            const parts = [];
            if (historyMeta.adherence != null) parts.push(`Adherence: ${historyMeta.adherence}%`);
            const fb = (historyMeta.recentFeedback || []).slice(0, 3)
              .map((f) => f && f.feedback ? (f.date ? `${f.date}: ${f.feedback}` : f.feedback) : '')
              .filter(Boolean);
            if (fb.length) parts.push(`Recent feedback — ${fb.join(' | ')}`);
            if (historyMeta.oftenSkipped && historyMeta.oftenSkipped.length) parts.push(`Often skipped: ${historyMeta.oftenSkipped.slice(0, 5).join(', ')}`);
            if (parts.length) athleteResponseString = `How the athlete has been responding (use this to tune cues, pain rules and progressions):\n${parts.join('\n')}`;
          }

          const combinedContext = [phaseLine, context.trim(), historyContextString, athleteResponseString].filter(Boolean).join('\n\n');
          const res = await fetch('/api/parse', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-coach-pass': pass },
            body: JSON.stringify({ text: t, context: combinedContext }),
          });
          let data = {};
          try { data = await res.json(); } catch (_) { data = {}; }
          if (!res.ok) {
            if (res.status === 401) {
              try { localStorage.removeItem('coach_pass'); } catch (_) {}
              setPass('');
              setGateRequired(true);
              setGateOpen(true);
              setError(data.error || 'Incorrect coach passphrase.');
            } else if (res.status === 503) {
              setError(data.error || 'The server is missing its API key. Ask whoever runs the server to set GEMINI_API_KEY, then try again.');
            } else {
              setError(data.error || `Request failed (${res.status}). Your text is kept — try again.`);
            }
            setLoading(false);
            return;
          }
          const incoming = Array.isArray(data.exercises) ? data.exercises : [];
          const mapped = incoming.map((ex) => ({
            id: newId(),
            name: String(ex.name || ''),
            sets: Number.isFinite(ex.sets) ? ex.sets : (parseInt(ex.sets, 10) || 0),
            reps: String(ex.reps || ''),
            weight: String(ex.weight || ''),
            day: normalizeDay(ex.day),
            notes: String(ex.notes || ''),
            cues: Array.isArray(ex.cues) ? ex.cues.map(String) : [],
            raw: String(ex.raw || ''),
            // Rehab / physio fields (#1) — carried from the fast parse.
            rpe: String(ex.rpe || ''),
            tempo: String(ex.tempo || ''),
            side: String(ex.side || ''),
            frequency: String(ex.frequency || ''),
            equipment: String(ex.equipment || ''),
            target: String(ex.target || ''),
            painRule: String(ex.painRule || ''),
            regression: String(ex.regression || ''),
            progression: String(ex.progression || ''),
            why: String(ex.why || ''),
            cautions: String(ex.cautions || ''),
            video: '',
            videoAuto: true, // allow auto video search/pick
            imageUrl: '',
            imageAuto: true, // allow auto image matching
          }));

          // Reuse the athlete's curated history for any movement we've seen before.
          // Names with a reused history image skip per-exercise enrich (save quota).
          const reusedImageKeys = new Set();
          mapped.forEach((m) => {
            const key = String(m.name || '').trim().toLowerCase();
            const h = key && historyByName[key];
            if (!h) return;
            if ((!m.cues || !m.cues.length) && Array.isArray(h.cues) && h.cues.length) {
              m.cues = h.cues.slice();
            }
            if (h.image) {
              m.imageUrl = h.image;
              m.imageAuto = false; // don't let enrich override the curated image
              reusedImageKeys.add(key);
            }
            if (h.video) {
              m.video = h.video;
              m.videoAuto = false; // don't auto-search; reuse the curated clip
            }
          });

          setExercises(mapped);
          setEnrichByName({});
          setSummary(String(data.summary || ''));
          setTitles({});
          setScreen('review');

          // Image ranking is split PER EXERCISE and fired independently (pool of
          // 3) so each card's reference images stream in as soon as that one is
          // ranked — never blocking the review screen, and not waiting on the
          // whole batch. Each is best-effort; on failure that card just keeps
          // its client-library carousel.
          const uniqueNames = [...new Set(mapped.map((m) => m.name).filter(Boolean))]
            .filter((n) => !reusedImageKeys.has(n.trim().toLowerCase()));
          // Map name -> therapeutic target so the vision ranker prefers the
          // relevant position (#8). First non-empty target for that name wins.
          const targetByName = {};
          mapped.forEach((m) => {
            const k = String(m.name || '');
            if (k && !targetByName[k] && m.target) targetByName[k] = m.target;
          });
          setEnrichPending(new Set(uniqueNames.map((n) => n.toLowerCase())));
          (async () => {
            const POOL = 3;
            let i = 0;
            const worker = async () => {
              while (i < uniqueNames.length) {
                const name = uniqueNames[i++];
                const key = name.toLowerCase();
                try {
                  const er = await fetch('/api/enrich', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-coach-pass': pass },
                    body: JSON.stringify({ exercises: [{ name, target: targetByName[name] || '' }] }),
                  });
                  if (er.ok) {
                    const ed = await er.json().catch(() => ({}));
                    const results = Array.isArray(ed.results) ? ed.results : [];
                    const hit = results.find((r) => r && String(r.name).toLowerCase() === key) || results[0];
                    const imgs = hit && Array.isArray(hit.images) ? hit.images.map(String).filter(Boolean) : [];
                    if (imgs.length) setEnrichByName((prev) => ({ ...prev, [key]: imgs }));
                  }
                } catch (_) { /* keep client carousel */ }
                finally {
                  setEnrichPending((prev) => { const n = new Set(prev); n.delete(key); return n; });
                }
              }
            };
            await Promise.all(Array.from({ length: Math.min(POOL, uniqueNames.length) }, worker));
          })();
        } catch (e) {
          setError('Could not reach the server. Your text is kept — check your connection and try again.');
        } finally {
          setLoading(false);
        }
      };

      const updateEx = (id, patch) => setExercises((arr) => arr.map((e) => e.id === id ? { ...e, ...patch } : e));
      const deleteEx = (id) => setExercises((arr) => arr.filter((e) => e.id !== id));
      const addEx = () => setExercises((arr) => [...arr, {
        id: newId(), name: '', sets: 3, reps: '', weight: '', day: '', notes: '', cues: [], raw: '',
        rpe: '', tempo: '', side: '', frequency: '', equipment: '', target: '', painRule: '', regression: '', progression: '', why: '', cautions: '',
        video: '', videoAuto: true, imageUrl: '', imageAuto: true,
      }]);

      const exportObj = useMemo(() => buildExport(exercises, weekStart, phase), [exercises, weekStart, titles, phase]);
      const exportStr = useMemo(() => JSON.stringify(exportObj, null, 2), [exportObj]);

      const downloadJSON = () => {
        const blob = new Blob([exportStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `coach-plan-${weekStart}.json`;
        a.click();
        URL.revokeObjectURL(url);
        setExported(true);
      };
      const copyJSON = async () => {
        try {
          await navigator.clipboard.writeText(exportStr);
          setCopied(true); setExported(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (_) {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = exportStr; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); setCopied(true); setExported(true); setTimeout(() => setCopied(false), 2000); } catch (e) {}
          document.body.removeChild(ta);
        }
      };

      // ---- HEADER ----
      const Header = () => (
        <div className="border-b-2 border-[#0a0a0a] bg-[#c8202b] text-[#f5f3ee]">
          <div className="max-w-2xl mx-auto px-4 py-3 flex items-center gap-3">
            <Icon name="Sparkles" size={20} />
            <div className="flex-1 min-w-0">
              <h1 className="text-[26px] leading-none uppercase" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.04em' }}>Coach Mode</h1>
              <p className="label-mono text-[#f5f3ee]/80 mt-1">No login — generate a plan and send the JSON to your athlete.</p>
            </div>
          </div>
        </div>
      );

      // ---- PASSPHRASE GATE ----
      if (gateOpen) {
        return (
          <div className="min-h-full">
            <Header />
            <div className="max-w-md mx-auto px-4 py-10">
              <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee] p-5 space-y-3">
                <h2 className="text-[22px] leading-none uppercase" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.03em' }}>Coach access</h2>
                <p className="text-sm text-[#0a0a0a]/70 leading-relaxed">This coach tool is passphrase-protected. Enter the shared passphrase to continue.</p>
                {error && (
                  <div className="border-2 border-[#c8202b] bg-[#c8202b]/5 px-3 py-2">
                    <p className="text-sm text-[#0a0a0a]/80">{error}</p>
                  </div>
                )}
                <form onSubmit={submitGate} className="space-y-2">
                  <input type="password" value={passInput} onChange={(e) => setPassInput(e.target.value)} placeholder="Passphrase" className="ci" autoFocus />
                  <button type="submit" className="w-full px-4 py-3 bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition text-sm uppercase tracking-[0.25em] border-2 border-[#0a0a0a]">
                    Enter
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // ---- INPUT SCREEN ----
      if (screen === 'input') {
        return (
          <div className="min-h-full">
            <Header />
            <div className="max-w-2xl mx-auto px-4 py-5 space-y-4">
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <p className="label-mono text-[#0a0a0a]/50 mb-1.5">Week starting</p>
                  <input type="date" value={weekStart} onChange={(e) => setWeekStart(e.target.value || weekStart)} className="ci" />
                </div>
                <div>
                  <p className="label-mono text-[#0a0a0a]/50 mb-1.5">Rehab phase</p>
                  <select value={phase} onChange={(e) => setPhase(e.target.value)} className="ci">
                    <option value="">— none —</option>
                    <option value="Acute / protect">Acute / protect</option>
                    <option value="Load tolerance">Load tolerance</option>
                    <option value="Return to sport">Return to sport</option>
                  </select>
                </div>
              </div>

              {/* Protocol templates (#4) */}
              <div className="space-y-1.5">
                <p className="label-mono text-[#0a0a0a]/40">Templates — tap to load a starting protocol, then edit</p>
                <div className="flex flex-wrap gap-2">
                  {templates.map((t, i) => (
                    <button key={i} onClick={() => applyTemplate(t)} className="text-left border-2 border-[#1c2942] bg-[#e8e4d9] px-2.5 py-1.5 text-[11px] font-semibold leading-snug active:scale-[0.98] transition">
                      {t.label}
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <p className="label-mono text-[#0a0a0a]/50 mb-1.5">Athlete context <span className="text-[#0a0a0a]/35">(optional — tailors the coaching cues)</span></p>
                <textarea
                  value={context}
                  onChange={(e) => setContext(e.target.value)}
                  rows={3}
                  placeholder={"e.g. 38yo, returning from R Achilles tendinopathy (pain-free); intermediate lifter; goal: rebuild calf capacity; full gym. (You can also paste the athlete's exported history here.)"}
                  className="ci resize-y leading-relaxed"
                />
              </div>

              {/* Import athlete history */}
              <div className="space-y-2">
                <input
                  ref={fileInputRef}
                  type="file"
                  accept=".json,application/json"
                  onChange={onHistoryFile}
                  className="hidden"
                />
                <button
                  onClick={() => { setHistoryError(''); if (fileInputRef.current) fileInputRef.current.click(); }}
                  className="w-full px-4 py-3 bg-[#f5f3ee] text-[#0a0a0a] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition label-mono border-2 border-dashed border-[#0a0a0a]"
                >
                  <Icon name="Upload" size={14} /> Import athlete history
                </button>
                <p className="text-[11px] text-[#0a0a0a]/45 leading-snug">Load the athlete’s “Full JSON backup”. Past cues, reference images and video links are reused when you prescribe the same movements.</p>

                {historyError && (
                  <div className="border-2 border-[#c8202b] bg-[#c8202b]/5 px-3 py-2">
                    <p className="text-sm text-[#0a0a0a]/80 leading-snug">{historyError}</p>
                  </div>
                )}

                {historyMeta && historyMeta.movements > 0 && (
                  <div className="flex items-center gap-2 border-2 border-[#1c2942] bg-[#e8e4d9] px-3 py-2">
                    <span className="flex-1 min-w-0 label-mono text-[#0a0a0a]/70 truncate">
                      Athlete history — {historyMeta.movements} movement{historyMeta.movements === 1 ? '' : 's'}{historyMeta.range ? ` · ${historyMeta.range}` : ''}
                    </span>
                    <button onClick={() => setHistoryReviewOpen(true)} className="px-2 py-1 bg-[#0a0a0a] text-[#f5f3ee] active:scale-95 transition label-mono">Review</button>
                    <button onClick={clearHistory} className="px-2 py-1 border-2 border-[#0a0a0a] bg-[#f5f3ee] active:scale-95 transition label-mono">Clear</button>
                  </div>
                )}
              </div>

              <div>
                <p className="label-mono text-[#0a0a0a]/50 mb-1.5">What should the athlete do this week?</p>
                <textarea
                  value={text}
                  onChange={(e) => setText(e.target.value)}
                  rows={8}
                  placeholder={"e.g. Monday: Back squat 4x8 @80kg, RDL 3x8, Walking lunge 3x12 each leg / 30s plank x3"}
                  className="ci resize-y leading-relaxed"
                />
              </div>

              <div className="space-y-1.5">
                <p className="label-mono text-[#0a0a0a]/40">Tap to load an example</p>
                <div className="flex flex-wrap gap-2">
                  {examples.map((ex, i) => (
                    <button key={i} onClick={() => setText(ex)} className="text-left border-2 border-[#0a0a0a] bg-[#e8e4d9] px-2.5 py-1.5 text-[11px] leading-snug active:scale-[0.98] transition max-w-full">
                      {ex.length > 60 ? ex.slice(0, 57) + '…' : ex}
                    </button>
                  ))}
                </div>
              </div>

              {error && (
                <div className="border-2 border-[#c8202b] bg-[#c8202b]/5 px-3 py-2.5">
                  <p className="label-mono text-[#c8202b] mb-1">— Error —</p>
                  <p className="text-sm text-[#0a0a0a]/80 leading-relaxed">{error}</p>
                </div>
              )}

              <button
                onClick={process}
                disabled={loading}
                className="w-full px-4 py-4 bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition disabled:opacity-60 text-sm uppercase tracking-[0.25em] border-2 border-[#0a0a0a]"
              >
                {loading ? <><Icon name="RefreshCw" size={16} className="animate-spin" /> Processing…</> : <><Icon name="Sparkles" size={16} /> Process</>}
              </button>
            </div>

            {historyReviewOpen && (
              <HistoryReview historyByName={historyByName} meta={historyMeta} onClose={() => setHistoryReviewOpen(false)} />
            )}
          </div>
        );
      }

      // ---- REVIEW SCREEN ----
      if (screen === 'review') {
        return (
          <div className="min-h-full pb-24">
            <Header />
            <div className="max-w-2xl mx-auto px-4 py-5 space-y-4">
              <div className="flex items-center gap-2">
                <button onClick={() => setScreen('input')} className="border-2 border-[#0a0a0a] px-2 py-2 active:scale-95 transition"><Icon name="ChevronLeft" size={16} /></button>
                <h2 className="flex-1 text-[22px] leading-none uppercase" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.03em' }}>Review</h2>
                <span className="label-mono text-[#0a0a0a]/50">{exercises.length} item{exercises.length === 1 ? '' : 's'}</span>
              </div>

              {summary && (
                <div className="border-l-4 border-[#1c2942] bg-[#e8e4d9] px-3 py-2.5">
                  <p className="label-mono text-[#0a0a0a]/60 mb-1">— Summary —</p>
                  <p className="text-sm leading-relaxed text-[#0a0a0a]/80">{summary}</p>
                </div>
              )}

              {enrichPending.size > 0 && (
                <div className="flex items-center gap-2 border-2 border-dashed border-[#0a0a0a]/40 bg-[#e8e4d9]/60 px-3 py-2">
                  <Icon name="RefreshCw" size={13} className="animate-spin text-[#c8202b]" />
                  <p className="label-mono text-[#0a0a0a]/60">Ranking reference images — {enrichPending.size} left. Review &amp; edit now; each fills in as it's ready.</p>
                </div>
              )}

              <div className="space-y-4">
                {exercises.map((ex, i) => (
                  <ExerciseCard key={ex.id} ex={ex} index={i} enrichImages={enrichByName[String(ex.name || '').toLowerCase()] || null} pending={enrichPending.has(String(ex.name || '').toLowerCase())} onChange={(p) => updateEx(ex.id, p)} onDelete={() => deleteEx(ex.id)} />
                ))}
              </div>

              <button onClick={addEx} className="w-full px-4 py-3 bg-[#f5f3ee] text-[#0a0a0a] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition label-mono border-2 border-dashed border-[#0a0a0a]">
                <Icon name="Plus" size={16} /> Add exercise
              </button>
            </div>

            {/* sticky footer */}
            <div className="fixed bottom-0 inset-x-0 border-t-2 border-[#0a0a0a] bg-[#f5f3ee]">
              <div className="max-w-2xl mx-auto px-4 py-3 flex gap-2">
                <button onClick={() => setScreen('input')} className="flex-1 px-4 py-3 bg-[#f5f3ee] text-[#0a0a0a] font-bold active:scale-[0.98] transition label-mono border-2 border-[#0a0a0a]">Back</button>
                <button onClick={() => { setExported(false); setScreen('export'); }} className="flex-[2] px-4 py-3 bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition label-mono border-2 border-[#0a0a0a]">
                  Confirm & Export <Icon name="ChevronRight" size={14} />
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ---- EXPORT SCREEN ----
      return (
        <div className="min-h-full pb-10">
          <Header />
          <div className="max-w-2xl mx-auto px-4 py-5 space-y-4">
            <div className="flex items-center gap-2">
              <button onClick={() => setScreen('review')} className="border-2 border-[#0a0a0a] px-2 py-2 active:scale-95 transition"><Icon name="ChevronLeft" size={16} /></button>
              <h2 className="flex-1 text-[22px] leading-none uppercase" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.03em' }}>Export</h2>
            </div>

            <div className="border-2 border-[#0a0a0a] bg-[#1c2942] text-[#f5f3ee] px-3 py-2.5">
              <p className="label-mono text-[#f5f3ee]/70 mb-0.5">Week starting</p>
              <p className="text-lg font-bold">{prettyDate(weekStart)} <span className="text-[#f5f3ee]/50 text-sm font-mono">({weekStart})</span></p>
            </div>

            {/* Per-day grouping preview with editable titles */}
            <div className="space-y-3">
              <p className="label-mono text-[#0a0a0a]/50">— Per-day preview —</p>
              {exportObj.days.length === 0 && (
                <div className="border-2 border-dashed border-[#0a0a0a]/40 px-3 py-4 text-center">
                  <p className="text-sm text-[#0a0a0a]/50">No exercises with a name yet. Go back and add some.</p>
                </div>
              )}
              {exportObj.days.map((d) => {
                // figure out which weekday/key this day came from for title editing
                const offset = Math.round((fmtDate(d.date) - fmtDate(weekStart)) / 86400000);
                const wd = (d.date === weekStart && d.title === (titles[UNASSIGNED] || 'This Week')) ? UNASSIGNED : (WEEKDAYS[offset] || UNASSIGNED);
                const titleKey = (offset >= 0 && offset <= 6 && WEEKDAYS[offset] && d.title !== 'This Week') ? WEEKDAYS[offset] : UNASSIGNED;
                return (
                  <div key={d.date + d.title} className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
                    <div className="px-3 py-2 bg-[#4a3528] text-[#f5f3ee] border-b-2 border-[#0a0a0a] flex items-center justify-between">
                      <span className="label-mono">{prettyDate(d.date)}</span>
                      <span className="label-mono opacity-70">{d.exercises.length} ex</span>
                    </div>
                    <div className="p-3 space-y-2">
                      <div>
                        <p className="label-mono text-[#0a0a0a]/50 mb-1">Session title</p>
                        <input
                          value={d.title}
                          onChange={(e) => setTitles((t) => ({ ...t, [titleKey]: e.target.value }))}
                          className="ci"
                        />
                      </div>
                      <ul className="space-y-1">
                        {d.exercises.map((e, i) => (
                          <li key={i} className="text-sm flex items-baseline gap-2">
                            <span className="font-semibold">{e.name}</span>
                            <span className="text-[#0a0a0a]/50 font-mono text-xs">
                              {e.sets ? `${e.sets}×` : ''}{e.reps}{e.weight ? ` @ ${e.weight}` : ''}
                            </span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Raw JSON peek */}
            <details className="border-2 border-[#0a0a0a]">
              <summary className="px-3 py-2 cursor-pointer label-mono bg-[#e8e4d9] select-none">View raw JSON</summary>
              <pre className="p-3 text-[10px] leading-tight overflow-x-auto font-mono bg-[#0a0a0a] text-[#f5f3ee]">{exportStr}</pre>
            </details>

            <div className="flex gap-2">
              <button onClick={downloadJSON} disabled={exportObj.days.length === 0} className="flex-1 px-4 py-3 bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition disabled:opacity-50 label-mono border-2 border-[#0a0a0a]">
                <Icon name="Download" size={16} /> Download JSON
              </button>
              <button onClick={copyJSON} disabled={exportObj.days.length === 0} className="flex-1 px-4 py-3 bg-[#c8202b] text-[#f5f3ee] font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition disabled:opacity-50 label-mono border-2 border-[#c8202b]">
                {copied ? <><Icon name="Check" size={16} /> Copied</> : <><Icon name="Copy" size={16} /> Copy JSON</>}
              </button>
            </div>

            {exported && (
              <div className="border-2 border-[#0a0a0a] bg-[#e8e4d9] px-3 py-3">
                <p className="label-mono text-[#0a0a0a]/60 mb-1 flex items-center gap-1"><Icon name="Check" size={12} /> — Done —</p>
                <p className="text-sm leading-relaxed text-[#0a0a0a]/80">Send this file to your athlete. They open the app → Import → pick this JSON.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
