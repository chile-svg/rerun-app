                  <li key={i} className="text-sm leading-snug text-[#0a0a0a]/85 flex gap-2">
                    <span className="text-[#c8202b] font-bold shrink-0">→</span>
                    <span>{cue}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}

          {/* Regression / Progression */}
          {(ex.regression || ex.progression) && (
            <div className="grid grid-cols-1 gap-2">
              {ex.regression && (
                <div className="border border-[#0a0a0a]/30 bg-[#f5f3ee] p-2">
                  <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#7a8a8d] mb-1">↓ REGRESSION</p>
                  <p className="text-xs leading-relaxed text-[#0a0a0a]/85">{ex.regression}</p>
                </div>
              )}
              {ex.progression && (
                <div className="border border-[#0a0a0a]/30 bg-[#f5f3ee] p-2">
                  <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#1c2942] mb-1">↑ PROGRESSION</p>
                  <p className="text-xs leading-relaxed text-[#0a0a0a]/85">{ex.progression}</p>
                </div>
              )}
            </div>
          )}

          {/* Pain rule */}
          {ex.painRule && (
            <div className="border-l-4 border-[#c8202b] bg-[#c8202b]/5 px-3 py-2">
              <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#c8202b] mb-0.5">⚠ PAIN RULE</p>
              <p className="text-xs leading-relaxed text-[#0a0a0a]/85">{ex.painRule}</p>
            </div>
          )}

          {/* Timer block */}
          <div className={!hasDetail ? 'pt-3' : ''}>
            <div className="flex items-center justify-between mb-1.5">
              <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#0a0a0a]/60">— TIMER —</p>
            </div>
            {metronome && tempoPhases ? (
              <RepTempoMetronome
                phases={tempoPhases}
                targetReps={targetRepCount}
                onClose={() => setMetronome(false)}
              />
            ) : timer ? (
              <Timer
                key={timer.key}
                initialSeconds={timer.seconds}
                label={timer.label}
                onClose={() => setTimer(null)}
              />
            ) : (
              <div className="flex flex-wrap gap-1.5">
                {tempoPhases && (
                  <button
                    onClick={() => { setTimer(null); setMetronome(true); }}
                    className="px-3 py-2 bg-[#c8202b] text-[#f5f3ee] text-[10px] font-bold uppercase tracking-[0.2em] active:scale-95 transition flex items-center gap-1.5"
                  >
                    <Icon name="Activity" size={10} /> TEMPO ({tempoPhases.reduce((a,p) => a + p.seconds, 0)}s/REP)
                  </button>
                )}
                {timedSeconds && (
                  <button
                    onClick={() => { setMetronome(false); setTimer({ seconds: timedSeconds, label: `HOLD · ${timedSeconds}s`, key: Date.now() }); }}
                    className="px-3 py-2 bg-[#0a0a0a] text-[#f5f3ee] text-[10px] font-bold uppercase tracking-[0.2em] active:scale-95 transition flex items-center gap-1.5"
                  >
                    <Icon name="Play" size={10} fill="currentColor" /> HOLD {timedSeconds}s
                  </button>
                )}
                {[30, 60, 90, 120].map(s => (
                  <button
                    key={s}
                    onClick={() => { setMetronome(false); setTimer({ seconds: s, label: `REST · ${s}s`, key: Date.now() }); }}
                    className="px-3 py-2 border-2 border-[#0a0a0a] hover:bg-[#0a0a0a] hover:text-[#f5f3ee] active:scale-95 transition text-[10px] font-bold uppercase tracking-[0.2em] tabular-nums"
                  >
                    REST {s}s
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Personal notes input — always shown, always editable */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#0a0a0a]/60">— MY NOTES —</p>
              {hasNote && (
                <span className="text-[9px] font-mono uppercase tracking-[0.2em] text-[#c8202b] font-bold">● SAVED</span>
              )}
            </div>
            <textarea
              value={personalNote}
              onChange={(e) => onNoteChange && onNoteChange(e.target.value)}
              placeholder="Loads used, RPE, what worked, what felt off..."
              rows={2}
              className="w-full bg-[#f5f3ee] border-2 border-[#0a0a0a] px-3 py-2 text-sm text-[#0a0a0a] placeholder-[#0a0a0a]/30 focus:outline-none focus:border-[#c8202b] resize-y"
              style={{ fontFamily: '"Space Grotesk", sans-serif' }}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- WEEKLY VIEW ----------
function WeeklyView({ cursor, dayMap, onTap, onToggle }) {
  const start = startOfWeek(cursor);
  const days = Array.from({ length: 7 }, (_, i) => addDays(start, i));
  const todayStr = isoToday();
  const weekDays = days.map(d => dayMap[d]).filter(Boolean);
  const vol = weeklyVolume(weekDays);

  return (
    <div className="space-y-3">
      {/* Title bar */}
      <div className="border-b-2 border-[#0a0a0a] pb-2">
        <p className="text-[10px] font-mono uppercase tracking-[0.25em] text-[#0a0a0a]/60">TRAINING WEEK / {String(vol.completed).padStart(2,'0')}—{String(vol.total).padStart(2,'0')}</p>
        <h2 className="text-[44px] leading-[0.85] mt-1" style={{ fontFamily: '"Anton", sans-serif' }}>
          {monthName(start).toUpperCase()} {dayNumber(start)}
        </h2>
      </div>

      {/* Weekly stat row — bib numbers */}
      {weekDays.length > 0 && (
        <div className="grid grid-cols-3 border-2 border-[#0a0a0a]">
          <VolStat label="TOTAL KM" value={vol.totalKm || '—'} />
          <VolStat label="RUNS" value={vol.runs} bordered />
          <VolStat label="STRENGTH" value={vol.strength} bordered />
        </div>
      )}

      {/* Day rows */}
      <div className="border-2 border-[#0a0a0a]">
        {days.map((date, idx) => {
          const day = dayMap[date];
          const isToday = date === todayStr;
          const isLast = idx === days.length - 1;

          if (!day) {
            return (
              <div key={date} className={`flex items-stretch ${!isLast ? 'border-b border-[#0a0a0a]/15' : ''} ${isToday ? 'bg-[#c8202b]/5' : ''}`}>
                <DayBadge date={date} isToday={isToday} dim />
                <div className="flex-1 px-3 py-3 flex items-center">
                  <span className="text-[10px] font-mono uppercase tracking-[0.2em] text-[#0a0a0a]/30">— REST DAY —</span>
                </div>
              </div>
            );
          }
          const style = ts(day.type);
          const iconName = style.icon;
          const isPast = date < todayStr;
          const isMissed = isPast && !day.completed && day.type !== 'rest';

          return (
            <button
              key={date}
              onClick={() => onTap(date)}
              className={`w-full flex items-stretch ${!isLast ? 'border-b border-[#0a0a0a]/15' : ''} text-left active:scale-[0.99] transition relative ${isToday ? 'bg-[#c8202b]/5' : ''} ${isMissed ? 'opacity-50' : ''}`}
            >
              {/* Day number column */}
              <DayBadge date={date} isToday={isToday} accent={style.accent} />

              {/* Type accent strip */}
              <div className="w-1.5 shrink-0" style={{ background: style.accent }} />

              {/* Content */}
              <div className="flex-1 px-3 py-3 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <Icon name={iconName} size={12} style={{ color: style.accent }} />
                  <span className="text-[9px] uppercase tracking-[0.25em] font-bold" style={{ color: style.accent }}>{style.label}</span>
                  {isMissed && (
                    <span className="text-[9px] uppercase tracking-[0.2em] font-bold text-[#c8202b]">· MISSED</span>
                  )}
                </div>
                <p className="font-bold text-[#0a0a0a] truncate uppercase tracking-tight" style={{ fontFamily: '"Space Grotesk", sans-serif' }}>{day.title}</p>
                <p className="text-[10px] font-mono uppercase tracking-[0.15em] text-[#0a0a0a]/60 truncate mt-0.5">
                  {day.run?.distance || day.strength?.duration || '—'}
                  {day.run?.zone && ` / ${day.run.zone}`}
                </p>
              </div>

              {/* Check column */}
              <div
                onClick={(e) => { e.stopPropagation(); onToggle(date); }}
                className="shrink-0 px-3 flex items-center border-l border-[#0a0a0a]/15"
              >
                {day.completed
                  ? <Icon name="CheckCircle2" size={20} className="text-[#0a0a0a]" fill="#0a0a0a" fillOpacity={0.15} />
                  : <Icon name="Circle" size={20} className="text-[#0a0a0a]/30" />}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function NextRaceLine({ races, fallback }) {
  if (!races || races.length === 0) {
    return <p className="text-xs text-slate-400 truncate">{fallback}</p>;
  }
  const today = isoToday();
  const upcoming = races
    .filter(r => r.date >= today)
    .sort((a, b) => a.date.localeCompare(b.date))[0];
  if (!upcoming) {
    return <p className="text-xs text-slate-400 truncate">{fallback}</p>;
  }
  const days = daysUntil(upcoming.date, today);
  return (
    <p className="text-xs text-slate-400 truncate">
      <span className="mr-1">{upcoming.emoji}</span>
      <span className="text-emerald-300 font-bold">{days === 0 ? 'TODAY' : `${days} days`}</span>
      <span className="text-slate-500 mx-1">→</span>
      <span>{upcoming.name}</span>
    </p>
  );
}

function VolStat({ label, value, bordered }) {
  return (
    <div className={`px-2 py-3 text-center ${bordered ? 'border-l-2 border-[#0a0a0a]' : ''}`}>
      <div className="text-3xl leading-none tabular-nums" style={{ fontFamily: '"Anton", sans-serif' }}>
        {value}
      </div>
      <div className="text-[9px] font-mono uppercase tracking-[0.2em] text-[#0a0a0a]/60 mt-1.5">{label}</div>
    </div>
  );
}

function DayBadge({ date, isToday, dim, accent }) {
  return (
    <div className={`w-14 shrink-0 flex flex-col items-center justify-center border-r border-[#0a0a0a]/15 py-2 ${isToday ? 'bg-[#0a0a0a] text-[#f5f3ee]' : dim ? 'text-[#0a0a0a]/30' : 'text-[#0a0a0a]'}`}>
      <span className="text-[8px] font-mono uppercase tracking-[0.2em] leading-none mb-1">{dayName(date).toUpperCase()}</span>
      <span className="text-[26px] leading-none tabular-nums" style={{ fontFamily: '"Anton", sans-serif' }}>{dayNumber(date)}</span>
    </div>

}

// ---------- MONTHLY VIEW ----------
function MonthlyView({ cursor, dayMap, onTap }) {
  const c = fmtDate(cursor);
  const year = c.getFullYear();
  const month = c.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const startPad = first.getDay();
  const totalCells = Math.ceil((startPad + last.getDate()) / 7) * 7;
  const todayStr = isoToday();

  const cells = [];
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - startPad + 1;
    if (dayNum < 1 || dayNum > last.getDate()) {
      cells.push(null);
    } else {
      const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      cells.push({ dStr, dayNum });
    }
  }

  return (
    <div>
      {/* Title bar */}
      <div className="border-b-2 border-[#0a0a0a] pb-2 mb-3">
        <p className="text-[10px] font-mono uppercase tracking-[0.25em] text-[#0a0a0a]/60">CALENDAR / 30-DAY VIEW</p>
        <h2 className="text-[44px] leading-[0.85] mt-1 uppercase" style={{ fontFamily: '"Anton", sans-serif' }}>
          {first.toLocaleDateString('en-US', { month: 'long' })} <span className="text-[#0a0a0a]/40">'{String(year).slice(2)}</span>
        </h2>
      </div>

      {/* Day-of-week header */}
      <div className="grid grid-cols-7 border-2 border-[#0a0a0a] border-b-0">
        {['S','M','T','W','T','F','S'].map((d,i) => (
          <div key={i} className={`text-center text-[10px] font-mono font-bold uppercase tracking-[0.2em] py-2 bg-[#0a0a0a] text-[#f5f3ee] ${i > 0 ? 'border-l border-[#f5f3ee]/20' : ''}`}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      <div className="grid grid-cols-7 border-2 border-[#0a0a0a] border-t-0">
        {cells.map((cell, i) => {
          if (!cell) return <div key={i} className={`aspect-square bg-[#e8e4d9] ${i % 7 !== 0 ? 'border-l border-[#0a0a0a]/15' : ''} ${i >= 7 ? 'border-t border-[#0a0a0a]/15' : ''}`} />;
          const day = dayMap[cell.dStr];
          const style = day ? ts(day.type) : null;
          const isToday = cell.dStr === todayStr;
          const isDarkBg = style && style.text.includes('f5f3ee');

          return (
            <button
              key={i}
              onClick={() => day && onTap(cell.dStr)}
              disabled={!day}
              className={`aspect-square relative flex flex-col items-stretch p-1 ${i % 7 !== 0 ? 'border-l border-[#0a0a0a]/15' : ''} ${i >= 7 ? 'border-t border-[#0a0a0a]/15' : ''} ${day ? 'active:scale-95 transition' : ''} ${isToday ? 'ring-2 ring-[#c8202b] ring-inset z-10' : ''}`}
              style={{ background: day ? style.accent : 'transparent' }}
            >
              <span className={`text-[11px] font-bold tabular-nums leading-none ${day ? (isDarkBg ? 'text-[#f5f3ee]' : 'text-[#0a0a0a]') : 'text-[#0a0a0a]/30'}`} style={{ fontFamily: '"Anton", sans-serif' }}>{cell.dayNum}</span>
              {day && (
                <>
                  <span className={`text-[7px] uppercase font-bold tracking-[0.1em] mt-auto truncate w-full ${isDarkBg ? 'text-[#f5f3ee]/80' : 'text-[#0a0a0a]/60'}`}>{style.label}</span>
                  {day.completed && (
                    <div className={`absolute top-0.5 right-0.5 w-1.5 h-1.5 rounded-full ${isDarkBg ? 'bg-[#f5f3ee]' : 'bg-[#0a0a0a]'}`} />
                  )}
                </>
              )}
            </button>
          );
        })}
      </div>

      {/* Legend */}
      <div className="mt-4 border-2 border-[#0a0a0a]">
        <div className="px-3 py-2 border-b-2 border-[#0a0a0a]">
          <span className="text-[10px] font-mono uppercase tracking-[0.25em] font-bold">SESSION KEY</span>
        </div>
        <div className="p-3 flex flex-wrap gap-1.5">
          {Object.entries(typeStyles).filter(([k]) => k !== 'custom').map(([k, v]) => (
            <span key={k} className="inline-flex items-center gap-1.5 px-2 py-1 text-[9px] font-bold uppercase tracking-[0.15em] border border-[#0a0a0a]">
              <span className="w-2 h-2" style={{ background: v.accent }} />
              {v.label}
            </span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ---------- EDIT MODAL ----------
function EditModal({ day, shoes = [], onClose, onSave }) {
  const [draft, setDraft] = useState(() => ({
    title: day.title || '',
    type: day.type || 'easy',
    runDistance: day.run?.distance || '',
    runZone: day.run?.zone || '',
    runPace: day.run?.pace || '',
    runDetail: day.run?.detail || '',
    strengthDuration: day.strength?.duration || '',
    shoe: day.shoe || '',
    tag: day.tag || '',
    exercises: day.exercises ? day.exercises.map(e => ({ ...e })) : [],
  }));

  // Build dropdown options including the current shoe (in case it's not in the managed list)
  const shoeOptions = useMemo(() => {
    const all = new Set(shoes);
    if (draft.shoe && draft.shoe !== '—') all.add(draft.shoe);
    return Array.from(all).sort();
  }, [shoes, draft.shoe]);

  const updateEx = (i, patch) => {
    setDraft(d => ({ ...d, exercises: d.exercises.map((e, idx) => idx === i ? { ...e, ...patch } : e) }));
  };
  const removeEx = (i) => setDraft(d => ({ ...d, exercises: d.exercises.filter((_, idx) => idx !== i) }));
  const addEx = () => setDraft(d => ({ ...d, exercises: [...d.exercises, { name: '', sets: '', reps: '' }] }));

  const save = () => {
    const patch = {
      title: draft.title,
      type: draft.type,
      shoe: draft.shoe,
      tag: draft.tag,
      exercises: draft.exercises.filter(e => e.name.trim()),
    };
    if (draft.runDistance || draft.runZone || draft.runDetail || draft.runPace) {
      patch.run = { distance: draft.runDistance, zone: draft.runZone, pace: draft.runPace, detail: draft.runDetail };
    } else {
      patch.run = undefined;
    }
    if (draft.strengthDuration) {
      patch.strength = { duration: draft.strengthDuration };
    } else {
      patch.strength = undefined;
    }
    onSave(patch);
  };

  return (
    <Modal onClose={onClose} title="Edit session">
      <div className="space-y-4">
        <Field label="Title">
          <input value={draft.title} onChange={e => setDraft({ ...draft, title: e.target.value })} className="modal-input" />
        </Field>
        <Field label="Type">
          <select value={draft.type} onChange={e => setDraft({ ...draft, type: e.target.value })} className="modal-input">
            {Object.keys(typeStyles).filter(k => k !== 'custom').map(k => (
              <option key={k} value={k}>{typeStyles[k].label}</option>
            ))}
            <option value="custom">Custom</option>
          </select>
        </Field>

        <div className="rounded-xl border border-slate-800 p-3 space-y-2">
          <p className="text-[10px] uppercase tracking-wider font-bold text-slate-500">Run details (optional)</p>
          <Field label="Distance">
            <input value={draft.runDistance} onChange={e => setDraft({ ...draft, runDistance: e.target.value })} placeholder="e.g. 10 km" className="modal-input" />
          </Field>
          <div className="grid grid-cols-2 gap-2">
            <Field label="Zone">
              <input value={draft.runZone} onChange={e => setDraft({ ...draft, runZone: e.target.value })} placeholder="Z2" className="modal-input" />
            </Field>
            <Field label="Pace">
              <input value={draft.runPace} onChange={e => setDraft({ ...draft, runPace: e.target.value })} placeholder="5:35–6:20" className="modal-input" />
            </Field>
          </div>
          <Field label="Detail">
            <input value={draft.runDetail} onChange={e => setDraft({ ...draft, runDetail: e.target.value })} placeholder="2 km warm up · 3×5 min Z4…" className="modal-input" />
          </Field>
        </div>

        <Field label="Strength duration (optional)">
          <input value={draft.strengthDuration} onChange={e => setDraft({ ...draft, strengthDuration: e.target.value })} placeholder="60 min" className="modal-input" />
        </Field>

        <Field label="Shoe">
          <div className="relative">
            <select
              value={draft.shoe || ''}
              onChange={e => setDraft({ ...draft, shoe: e.target.value })}
              className="modal-input appearance-none pr-8"
            >
              <option value="">— None —</option>
              {shoeOptions.map(s => (
                <option key={s} value={s}>{s}</option>
              ))}
            </select>
            <Icon name="ChevronDown" size={14} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none" />
          </div>
          <p className="text-[10px] text-slate-500 mt-1">Manage your shoe list from the gear icon in the header.</p>
        </Field>

        <div>
          <div className="flex items-center justify-between mb-2">
            <p className="text-[10px] uppercase tracking-wider font-bold text-slate-500">Exercises</p>
            <button onClick={addEx} className="flex items-center gap-1 px-2 py-1 rounded-lg bg-emerald-500/20 text-emerald-300 text-xs font-semibold">
              <Icon name="Plus" size={12} /> Add
            </button>
          </div>

          {/* Exercise group tag (Pre/Post-Run) — grouped with the exercises section */}
          <div className="mb-2">
            <Field label="Exercise group tag">
              <select
                value={draft.tag || ''}
                onChange={e => setDraft({ ...draft, tag: e.target.value })}
                className="modal-input appearance-none"
              >
                <option value="">— None —</option>
                <option value="Pre-Run">Pre-Run</option>
                <option value="Post-Run">Post-Run</option>
                <option value="Mobility">Mobility</option>
                <option value="Activation">Activation</option>
                <option value="Cooldown">Cooldown</option>
              </select>
            </Field>
          </div>

          <div className="space-y-2">
            {draft.exercises.map((ex, i) => (
              <div key={i} className="p-2 rounded-lg bg-slate-950/60 border border-slate-800 space-y-1.5">
                <div className="flex gap-2">
                  <input value={ex.name} onChange={e => updateEx(i, { name: e.target.value })} placeholder="Name" className="modal-input flex-1" />
                  <button onClick={() => removeEx(i)} className="p-2 text-red-400 hover:bg-red-500/10 rounded-lg">
                    <Icon name="Trash2" size={14} />
                  </button>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <input value={ex.sets || ''} onChange={e => updateEx(i, { sets: e.target.value })} placeholder="Sets (3)" className="modal-input" />
                  <input value={ex.reps || ''} onChange={e => updateEx(i, { reps: e.target.value })} placeholder="Reps (12)" className="modal-input" />
                </div>
                <input value={ex.video || ''} onChange={e => updateEx(i, { video: e.target.value })} placeholder="YouTube link (optional — pins the video)" className="modal-input" />
              </div>
            ))}
            {draft.exercises.length === 0 && (
              <p className="text-xs text-slate-600 text-center py-3">No exercises. Tap Add to create one.</p>
            )}
          </div>
        </div>

        <div className="flex gap-2 pt-2">
          <button onClick={onClose} className="flex-1 px-4 py-2.5 rounded-xl bg-slate-800 font-semibold">Cancel</button>
          <button onClick={save} className="flex-1 px-4 py-2.5 rounded-xl bg-emerald-500 text-slate-950 font-bold flex items-center justify-center gap-1">
            <Icon name="Save" size={16} /> Save
          </button>
        </div>
      </div>

      <style>{`
        .modal-input {
          width: 100%;
          background: #f5f3ee;
          border: 1.5px solid #0a0a0a;
          border-radius: 0;
          padding: 0.6rem 0.75rem;
          font-size: 0.875rem;
          color: #0a0a0a;
          font-family: "Space Grotesk", sans-serif;
        }

// Pull a YouTube video ID out of a bare ID or any common URL form.
function youtubeId(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (/^[A-Za-z0-9_-]{11}$/.test(s)) return s;
  const patterns = [
    /[?&]v=([A-Za-z0-9_-]{11})/,
    /youtu\.be\/([A-Za-z0-9_-]{11})/,
    /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
    /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
  ];
  for (const p of patterns) {
    const m = s.match(p);
    if (m) return m[1];
  }
  return null;
}

function VideoModal({ exercise, onClose }) {
  const [imgFailed, setImgFailed] = useState(false);
  const query = encodeURIComponent(`${exercise.name} exercise form tutorial`);
  const ytSearch = `https://www.youtube.com/results?search_query=${query}`;
  const pinnedId = youtubeId(exercise.video);
  const showImage = exercise.image && !imgFailed;

  // When no clip is pinned, look one up via the server's YouTube search so we
  // can embed a real, playable video (YouTube killed the old listType=search
  // inline embed). Needs YOUTUBE_API_KEY on the server; otherwise we fall back
  // to a tap-to-search link.
  const [results, setResults] = useState([]);
  const [idx, setIdx] = useState(0);
  const [ytStatus, setYtStatus] = useState('idle'); // idle|loading|ok|empty|unavailable|error

  useEffect(() => {
    if (pinnedId || !exercise.name) return;
    let cancelled = false;
    setYtStatus('loading');
    (async () => {
      try {
        const r = await fetch(`/api/youtube?q=${query}`);
        const data = await r.json().catch(() => ({}));
        if (cancelled) return;
        if (!r.ok) { setYtStatus(r.status === 503 ? 'unavailable' : 'error'); return; }
        const list = (data.results || []).filter(x => x && x.videoId);
        if (!list.length) { setYtStatus('empty'); return; }
        setResults(list); setIdx(0); setYtStatus('ok');
      } catch (e) { if (!cancelled) setYtStatus('error'); }
    })();
    return () => { cancelled = true; };
  }, [exercise.name, pinnedId, query]);

  const currentId = pinnedId || (results[idx] && results[idx].videoId) || null;
  const cycle = () => { if (results.length > 1) setIdx((idx + 1) % results.length); };

  return (
    <Modal onClose={onClose} title="Exercise reference">
      <div className="space-y-3">
        <div className="border-b-2 border-[#0a0a0a] pb-2">
          <h3 className="text-[24px] leading-[0.95] uppercase break-words" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.01em' }}>{exercise.name}</h3>
          {(exercise.sets || exercise.reps || exercise.weight) && (
            <p className="text-[10px] font-mono uppercase tracking-[0.2em] text-[#0a0a0a]/60 mt-1.5">
              {(exercise.sets || exercise.reps) && (exercise.sets ? `${exercise.sets} × ${exercise.reps}` : exercise.reps)}
              {exercise.weight && <span className={(exercise.sets || exercise.reps) ? 'ml-2 text-[#0a0a0a]/50' : ''}>{(exercise.sets || exercise.reps) ? `· ${exercise.weight}` : exercise.weight}</span>}
            </p>
          )}
        </div>

        {Array.isArray(exercise.cues) && exercise.cues.length > 0 && (
          <div className="border-l-4 border-[#c8202b] bg-[#e8e4d9] px-3 py-2.5">
            <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#0a0a0a]/60 mb-1.5">— CUES —</p>
            <ol className="space-y-1">
              {exercise.cues.map((cue, i) => (
                <li key={i} className="flex gap-2 text-xs leading-relaxed text-[#0a0a0a]/80">
                  <span className="font-mono font-bold text-[#c8202b]">{i + 1}.</span>
                  <span>{cue}</span>
                </li>
              ))}
            </ol>
          </div>
        )}

        {showImage && (
          <div className="space-y-1">
            <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#0a0a0a]/50 text-center">— REFERENCE —</p>
            <div className="border-2 border-[#0a0a0a] bg-[#e8e4d9] overflow-hidden">
              <img
                src={exercise.image}
                alt={`${exercise.name} reference`}
                className="w-full h-auto block"
                onError={() => setImgFailed(true)}
              />
            </div>
          </div>
        )}

        {currentId ? (
          <div className="space-y-1">
            <div className="border-2 border-[#0a0a0a] bg-[#0a0a0a] overflow-hidden aspect-video">
              <iframe
                key={currentId}
                src={`https://www.youtube-nocookie.com/embed/${currentId}?rel=0`}
                className="w-full h-full"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen
                title={`${exercise.name} video`}
              />
            </div>
            {!pinnedId && results.length > 1 && (
              <button onClick={cycle} className="flex items-center justify-center gap-1.5 w-full px-3 py-2 bg-[#e8e4d9] border-2 border-[#0a0a0a] text-[10px] font-mono uppercase tracking-[0.2em] font-bold active:scale-[0.98] transition">
                <Icon name="Search" size={12} /> Try another clip ({idx + 1}/{results.length})
              </button>
            )}
          </div>
        ) : (
          <a href={ytSearch} target="_blank" rel="noreferrer" className="flex flex-col items-center justify-center gap-2 border-2 border-dashed border-[#0a0a0a]/40 bg-[#e8e4d9] aspect-video text-center px-5 active:scale-[0.99] transition">
            <Icon name="Search" size={24} className="text-[#c8202b]" />
            <p className="text-xs text-[#0a0a0a]/60 leading-snug">
              {ytStatus === 'loading'
                ? 'Finding a clip…'
                : <>No clip pinned. Tap to search YouTube for<br /><span className="font-bold">“{exercise.name}”</span>.</>}
            </p>
          </a>
        )}

        <a href={ytSearch} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 w-full px-4 py-3 bg-[#c8202b] text-[#f5f3ee] font-bold active:scale-[0.98] transition text-[11px] uppercase tracking-[0.2em] border-2 border-[#c8202b]">
          <Icon name="Search" size={14} /> Open on YouTube
        </a>

        <div className="border-l-4 border-[#0a0a0a] bg-[#e8e4d9] px-3 py-2.5">
          <p className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold text-[#0a0a0a]/60 mb-1">— TIP —</p>
          <p className="text-xs leading-relaxed text-[#0a0a0a]/80">
            {pinnedId
              ? 'Showing the clip pinned to this exercise.'
              : ytStatus === 'unavailable'
                ? 'Showing a YouTube search link. Set YOUTUBE_API_KEY on the server to auto-embed clips here.'
                : 'Auto-picked from YouTube. Use “Try another clip” to cycle, or edit the session to pin a specific link.'}
          </p>
        </div>
      </div>
    </Modal>
  );
}

            <p className="text-xs text-[#0a0a0a]/60 mt-1 leading-relaxed">These appear in the shoe dropdown when editing sessions.</p>
          </div>

          <div className="flex gap-2">
            <input
              value={newShoe}
              onChange={e => setNewShoe(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addShoe(); }}
              placeholder="Add a shoe (e.g. Nike Vaporfly 3)"
              className="modal-input flex-1"
            />
            <button
              onClick={addShoe}
              disabled={!newShoe.trim()}
              className="px-4 bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center gap-1 active:scale-95 transition disabled:opacity-40 disabled:cursor-not-allowed"
            >
              <Icon name="Plus" size={16} />
            </button>
          </div>

          {shoeList.length === 0 ? (
            <p className="text-xs text-[#0a0a0a]/50 text-center py-4 border border-[#0a0a0a]/20">No shoes yet. Add one above.</p>
          ) : (
            <div className="space-y-1.5">
              {shoeList.map((s, i) => (
                <div key={i} className="flex items-center gap-2 p-2 border border-[#0a0a0a]/40 bg-[#f5f3ee]">
                  <span className="text-xl shrink-0">👟</span>
                  <input
                    value={s}
                    onChange={e => renameShoe(i, e.target.value)}
                    className="modal-input flex-1"
                  />
                  <button
                    onClick={() => removeShoe(i)}
                    className="p-2 text-[#0a0a0a]/40 hover:text-[#c8202b] transition"
                  >
                    <Icon name="Trash2" size={14} />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="flex gap-2 pt-1">
          <button onClick={onClose} className="flex-1 px-4 py-2.5 border-2 border-[#0a0a0a] bg-[#f5f3ee] text-[#0a0a0a] font-bold uppercase tracking-[0.15em] text-[11px] active:scale-[0.98] transition">Cancel</button>
          <button
            onClick={save}
            className="flex-1 px-4 py-2.5 border-2 border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee] font-bold flex items-center justify-center gap-1.5 uppercase tracking-[0.15em] text-[11px] active:scale-[0.98] transition"
          >
            <Icon name="Save" size={16} /> Save
          </button>
        </div>
      </div>

      <style>{`
        .modal-input {
          width: 100%;
          background: #f5f3ee;
          border: 1.5px solid #0a0a0a;
          border-radius: 0;
          padding: 0.6rem 0.75rem;
          font-size: 0.875rem;
          color: #0a0a0a;
          font-family: "Space Grotesk", sans-serif;
        }
        .modal-input::placeholder { color: rgba(10,10,10,0.35); }
        .modal-input:focus { outline: none; border-color: #c8202b; box-shadow: inset 0 0 0 1px #c8202b; }
        select.modal-input { appearance: none; background-image: linear-gradient(45deg, transparent 50%, #0a0a0a 50%), linear-gradient(135deg, #0a0a0a 50%, transparent 50%); background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 2rem; }
      `}</style>
    </Modal>
  );
}

// ---------- DRIVE SYNC MODAL ----------
function SyncModal({ status, onClose, onSignIn, onSignOut, onPush, onPull }) {
  const fmtSync = (iso) => {
    if (!iso) return 'Never';
    try {
      return new Date(iso).toLocaleString();
    } catch {
      return iso;
    }
  };

  return (
    <Modal onClose={onClose} title="Google Drive sync">
      <div className="space-y-4">
        {/* Status row */}
        <div className="rounded-xl bg-slate-950/60 border border-slate-800 p-3 space-y-2">
          <div className="flex items-center gap-2">
            {status.signedIn ? (
              <Icon name="Cloud" size={16} className="text-emerald-400" />
            ) : (
              <Icon name="CloudOff" size={16} className="text-slate-500" />
            )}
            <span className="text-sm font-semibold">
              {status.signedIn ? 'Signed in' : 'Not signed in'}
            </span>
          </div>
          <p className="text-xs text-slate-400 font-mono">
            Last sync: {fmtSync(status.lastSync)}
          </p>
        </div>

        {!status.signedIn ? (
          <button
            onClick={onSignIn}
            className="w-full px-4 py-3 rounded-xl bg-emerald-500 text-slate-950 font-bold flex items-center justify-center gap-2"
          >
            <Icon name="LogIn" size={16} /> Sign in with Google
          </button>
        ) : (
          <div className="space-y-2">
            <button
              onClick={onPush}
              disabled={status.syncing}
              className="w-full px-4 py-3 rounded-xl bg-emerald-500 text-slate-950 font-bold flex items-center justify-center gap-2 disabled:opacity-50"
            >
              {status.syncing ? <Icon name="RefreshCw" size={16} className="animate-spin" /> : <Icon name="Upload" size={16} />}
              <span>Push to Drive</span>
            </button>
            <button
              onClick={onPull}
              disabled={status.syncing}
              className="w-full px-4 py-3 rounded-xl bg-slate-800 text-slate-100 font-bold flex items-center justify-center gap-2 disabled:opacity-50"
            >
              {status.syncing ? <Icon name="RefreshCw" size={16} className="animate-spin" /> : <Icon name="Download" size={16} />}
              <span>Pull from Drive</span>
            </button>
            <button
              onClick={onSignOut}
              className="w-full px-4 py-2 rounded-xl bg-slate-900 text-slate-400 text-sm font-semibold flex items-center justify-center gap-2"
            >
              <Icon name="LogOut" size={14} /> Sign out
            </button>
          </div>
        )}

        <div className="rounded-xl bg-slate-950/60 border border-slate-800 p-3 text-xs text-slate-400 leading-relaxed space-y-1.5">
          <p>
            <strong className="text-slate-200">How it works:</strong> your plan is stored in a hidden
            app folder on your Drive — invisible to your normal Drive view, only this app can read it.
          </p>
          <p>
            <strong className="text-slate-200">Push</strong> uploads your local plan, overwriting Drive's copy.
            <strong className="text-slate-200"> Pull</strong> replaces your local plan with Drive's copy.
          </p>
          <p className="text-amber-300/80">
            ⚠️ Drive sync requires the native Android build with OAuth configured. See <code>docs/google-drive-setup.md</code>.
          </p>
        </div>
      </div>
    </Modal>
  );
}

// ---------- BASE MODAL ----------
function Modal({ children, onClose, title }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-2 bg-[#0a0a0a]/60 backdrop-blur-sm animate-[fadeIn_0.2s]" onClick={onClose}>
      <div
        className="w-full max-w-md max-h-[90vh] overflow-y-auto bg-[#f5f3ee] border-2 border-[#0a0a0a] shadow-2xl animate-[slideUp_0.25s_cubic-bezier(0.4,0,0.2,1)]"
        onClick={e => e.stopPropagation()}
      >
        <div className="sticky top-0 z-10 flex items-stretch bg-[#0a0a0a] text-[#f5f3ee] border-b-2 border-[#0a0a0a]">
          <h3 className="flex-1 px-4 py-3 text-sm uppercase tracking-[0.25em] font-bold" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.15em' }}>{title}</h3>
          <button onClick={onClose} className="px-4 hover:bg-[#c8202b] active:scale-95 transition border-l-2 border-[#f5f3ee]/20">
            <Icon name="X" size={18} />
          </button>
        </div>
        <div className="p-4">{children}</div>
      </div>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      `}</style>
    </div>
  );
}


    // ====================== MOUNT ======================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
