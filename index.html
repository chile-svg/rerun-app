  <script type="text/babel" data-type="module">
    const { useState, useMemo, useRef, useEffect } = React;

    // ----- Inline Icon component using window.__ICONS__ paths -----
    function Icon({ name, size = 16, className = '', fill, fillOpacity, strokeWidth = 2, style, ...rest }) {
      const path = window.__ICONS__[name];
      if (!path) return React.createElement('span', { style: { display: 'inline-block', width: size, height: size } });
      const computedStyle = style || {};
      return React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg',
        width: size,
        height: size,
        viewBox: '0 0 24 24',
        fill: fill || 'none',
        fillOpacity,
        stroke: 'currentColor',
        strokeWidth,
        strokeLinecap: 'round',
        strokeLinejoin: 'round',
        className,
        style: computedStyle,
        ...rest,
        dangerouslySetInnerHTML: { __html: path },
      });
    }

    // ----- Inline localStorage persistence -----
    const PLAN_KEY = 'run_plan_v1';
    const META_KEY = 'run_plan_meta_v1';
    async function localLoadPlan() {
      try {
        const raw = localStorage.getItem(PLAN_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        console.error('load failed', e);
        return null;
      }
    }
    async function localSavePlan(plan) {
      localStorage.setItem(PLAN_KEY, JSON.stringify(plan));
      const meta = JSON.parse(localStorage.getItem(META_KEY) || '{}');
      meta.lastLocalSave = new Date().toISOString();
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    }
    async function getMeta() {
      try { return JSON.parse(localStorage.getItem(META_KEY) || '{}'); }
      catch { return {}; }
    }
    async function driveIsSignedIn() { return false; }

    // ----- Fallback workout-script builder (offline coach) -----
    // Inlined copy of buildFallbackScript for unit testing without Capacitor imports.
// Keep in sync with /home/claude/run-plan-mobile/src/services/coach.js

function buildFallbackScript(session, exercises, restSeconds) {
  const steps = [];
  let totalSec = 0;
  let stepId = 0;
  const nextId = () => `s${++stepId}`;

  steps.push({
    id: nextId(),
    kind: 'cue',
    label: 'Get ready',
    voiceLine: `Starting ${session.title}. ${exercises.length} exercises today.`,
    durationSec: 5,
  });
  totalSec += 5;

  exercises.forEach((ex, exIdx) => {
    const sets = parseInt(ex.sets) || 1;
    const reps = ex.reps;
    const isHold = typeof reps === 'string' && /\d+\s*s/i.test(reps);
    const holdSec = isHold ? parseInt(reps) : null;

    for (let setNum = 1; setNum <= sets; setNum++) {
      steps.push({
        id: nextId(),
        kind: 'transition',
        label: `${ex.name}`,
        voiceLine: sets > 1
          ? `${ex.name}, set ${setNum} of ${sets}.`
          : `${ex.name}.`,
        durationSec: 4,
      });
      totalSec += 4;

      if (holdSec) {
        steps.push({
          id: nextId(),
          kind: 'exercise',
          label: ex.name,
          voiceLine: `Hold for ${holdSec} seconds.`,
          durationSec: holdSec,
          sets,
          currentSet: setNum,
        });
        totalSec += holdSec;
      } else {
        const repCount = parseInt(reps) || 10;
        const dur = Math.max(20, repCount * 3);
        steps.push({
          id: nextId(),
          kind: 'exercise',
          label: ex.name,
          voiceLine: `${repCount} reps, controlled tempo.`,
          targetReps: repCount,
          durationSec: dur,
          sets,
          currentSet: setNum,
        });
        totalSec += dur;
      }

      const isLastSet = setNum === sets;
      const isLastExercise = exIdx === exercises.length - 1;
      if (!(isLastSet && isLastExercise)) {
        const rest = isLastSet ? Math.round(restSeconds * 1.2) : restSeconds;
        steps.push({
          id: nextId(),
          kind: 'rest',
          label: 'Rest',
          voiceLine: `Rest ${rest} seconds.`,
          durationSec: rest,
        });
        totalSec += rest;
      }
    }
  });

  steps.push({
    id: nextId(),
    kind: 'cue',
    label: 'Done',
    voiceLine: `Session complete. Nice work.`,
    durationSec: 3,
  });
  totalSec += 3;

  return {
    title: session.title,
    estimatedDurationSec: totalSec,
    steps,
  };
}


    // ----- WorkoutPlayer component -----
    // src/components/WorkoutPlayer.jsx
//
// Plays a generated workout script as a follow-along experience.
//
// Features:
//   - Big timer for current step (rest / exercise / hold)
//   - Auto-advance to next step when timer hits zero
//   - Pause / resume / skip / back
//   - Optional TTS using the Web Speech API (works offline on Android WebView)
//   - Wake-lock if available so the screen doesn't sleep mid-set
//
// The script schema is defined in services/coach.js.


function WorkoutPlayer({ script, onClose }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [secondsLeft, setSecondsLeft] = useState(script.steps[0]?.durationSec ?? 0);
  const [paused, setPaused] = useState(true);
  const [muted, setMuted] = useState(false);
  const wakeLockRef = useRef(null);
  const intervalRef = useRef(null);

  const step = script.steps[stepIdx];
  const isLast = stepIdx >= script.steps.length - 1;

  // Acquire wake lock when playing
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (paused) {
        if (wakeLockRef.current) {
          try { await wakeLockRef.current.release(); } catch {}
          wakeLockRef.current = null;
        }
        return;
      }
      if ('wakeLock' in navigator && !wakeLockRef.current) {
        try {
          const lock = await navigator.wakeLock.request('screen');
          if (!cancelled) wakeLockRef.current = lock;
        } catch {/* not supported, fine */}
      }
    }
    acquire();
    return () => {
      cancelled = true;
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    };
  }, [paused]);

  // Speak when entering a new step
  useEffect(() => {
    if (!step) return;
    if (!muted && step.voiceLine && 'speechSynthesis' in window) {
      const utter = new SpeechSynthesisUtterance(step.voiceLine);
      utter.rate = 1.0;
      utter.pitch = 1.0;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    }
    // Reset timer to the step's full duration
    setSecondsLeft(step.durationSec ?? 0);
  }, [stepIdx, muted]); // intentional — re-trigger only on step change or mute toggle

  // Timer tick
  useEffect(() => {
    if (paused || !step?.durationSec) {
      clearInterval(intervalRef.current);
      return;
    }
    intervalRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) {
          // Advance
          if (!isLast) {
            setStepIdx(i => i + 1);
            return 0;
          } else {
            setPaused(true);
            return 0;
          }
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [paused, stepIdx, isLast, step]);

  // Cleanup TTS on unmount
  useEffect(() => () => {
    if ('speechSynthesis' in window) window.speechSynthesis.cancel();
  }, []);

  if (!step) return null;

  const total = script.steps.length;
  const progress = ((stepIdx + (step.durationSec ? (step.durationSec - secondsLeft) / step.durationSec : 0)) / total) * 100;

  const stepColor = {
    rest: '#7a8a8d',         // steel grey
    exercise: '#0a0a0a',     // asphalt
    transition: '#1c2942',   // ink blue
    cue: '#c8202b',          // bandit red
  }[step.kind] || '#0a0a0a';

  return (
    <div className="fixed inset-0 z-50 bg-[#f5f3ee] text-[#0a0a0a] flex flex-col">
      {/* Top bar */}
      <div className="flex items-stretch border-b-2 border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee]">
        <button onClick={onClose} className="px-4 py-3 hover:bg-[#c8202b] active:scale-95 transition border-r-2 border-[#f5f3ee]/20">
          <Icon name="X" size={18} />
        </button>
        <div className="flex-1 px-4 py-3 text-center min-w-0">
          <p className="text-[9px] font-mono uppercase tracking-[0.3em] text-[#f5f3ee]/60 truncate">{script.title}</p>
          <p className="text-[11px] font-bold tabular-nums tracking-[0.2em] mt-0.5">{String(stepIdx + 1).padStart(2,'0')} / {String(total).padStart(2,'0')}</p>
        </div>
        <button onClick={() => setMuted(m => !m)} className="px-4 py-3 hover:bg-[#c8202b] active:scale-95 transition border-l-2 border-[#f5f3ee]/20">
          {muted ? <Icon name="VolumeX" size={18} /> : <Icon name="Volume2" size={18} />}
        </button>
      </div>

      {/* Progress bar */}
      <div className="h-[3px] bg-[#0a0a0a]/10 border-b-2 border-[#0a0a0a]">
        <div
          className="h-full transition-[width] duration-1000 ease-linear"
          style={{ width: `${progress}%`, background: stepColor }}
        />
      </div>

      {/* Main content — full bleed colored block */}
      <div
        className="flex-1 flex flex-col items-center justify-center px-6 text-center relative overflow-hidden"
        style={{
          background: step.kind === 'rest' ? '#e8e4d9' : (step.kind === 'cue' || step.kind === 'transition') ? stepColor : '#f5f3ee',
          color: (step.kind === 'cue' || step.kind === 'transition') ? '#f5f3ee' : '#0a0a0a',
        }}
      >
        {/* Kind tag */}
        <div className="absolute top-4 left-4 right-4 flex items-center justify-between text-[10px] font-mono uppercase tracking-[0.3em]">
          <span className="font-bold">— {step.kind} —</span>
          {step.sets && step.currentSet && (
            <span className="opacity-60">SET {String(step.currentSet).padStart(2,'0')} / {String(step.sets).padStart(2,'0')}</span>
          )}
        </div>

        <div className="flex-1 flex flex-col items-center justify-center w-full">
          <h2
            className="text-5xl leading-[0.85] mb-8 max-w-full break-words uppercase"
            style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.01em' }}
          >
            {step.label}
          </h2>

          {step.durationSec > 0 ? (
            <div
              className="text-[180px] leading-[0.8] tabular-nums font-bold"
              style={{ fontFamily: '"Anton", sans-serif' }}
            >
              {String(secondsLeft).padStart(2,'0')}
            </div>
          ) : null}

          {step.targetReps && (
            <p className="text-2xl font-bold mt-2" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.05em' }}>
              {step.targetReps} REPS
            </p>
          )}

          {step.formNotes && step.formNotes.length > 0 && (
            <div className="mt-8 max-w-sm space-y-1.5 border-t-2 border-current pt-4 opacity-80">
              {step.formNotes.map((note, i) => (
                <p key={i} className="text-sm font-mono">→ {note}</p>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Controls */}
      <div className="border-t-2 border-[#0a0a0a] bg-[#f5f3ee] flex items-stretch">
        <button
          onClick={() => setStepIdx(i => Math.max(0, i - 1))}
          disabled={stepIdx === 0}
          className="flex-1 py-5 hover:bg-[#0a0a0a]/5 active:scale-95 transition disabled:opacity-30 flex items-center justify-center gap-2 border-r-2 border-[#0a0a0a]"
        >
          <Icon name="SkipBack" size={18} />
          <span className="text-[10px] font-bold uppercase tracking-[0.2em]">PREV</span>
        </button>
        <button
          onClick={() => setPaused(p => !p)}
          className="flex-[2] py-5 active:scale-95 transition flex items-center justify-center gap-2"
          style={{ background: stepColor, color: '#f5f3ee' }}
        >
          {paused
            ? <><Icon name="Play" size={20} fill="currentColor" /><span className="text-sm font-bold uppercase tracking-[0.25em]">START</span></>
            : <><Icon name="Pause" size={20} fill="currentColor" /><span className="text-sm font-bold uppercase tracking-[0.25em]">PAUSE</span></>
          }
        </button>
        <button
          onClick={() => !isLast && setStepIdx(i => i + 1)}
          disabled={isLast}
          className="flex-1 py-5 hover:bg-[#0a0a0a]/5 active:scale-95 transition disabled:opacity-30 flex items-center justify-center gap-2 border-l-2 border-[#0a0a0a]"
        >
          <span className="text-[10px] font-bold uppercase tracking-[0.2em]">NEXT</span>
          <Icon name="SkipForward" size={18} />
        </button>
      </div>
    </div>
  );
}

// ---------- HELPERS ----------
const fmtDate = (s) => {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
};
const dayName = (s) => fmtDate(s).toLocaleDateString('en-US', { weekday: 'short' });
const dayNumber = (s) => fmtDate(s).getDate();
const monthName = (s) => fmtDate(s).toLocaleDateString('en-US', { month: 'short' });
const isoToday = () => {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
};
const startOfWeek = (s) => {
  const d = fmtDate(s);
  const day = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - day);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const addDays = (s, n) => {
  const d = fmtDate(s);
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// CSV parser — handles quoted fields, escaped quotes, embedded commas/newlines
function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQuotes = false; let i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQuotes = false; i++; continue;
      }
      field += c; i++; continue;
    }
    if (c === '"') { inQuotes = true; i++; continue; }
    if (c === ',') { row.push(field); field = ''; i++; continue; }
    if (c === '\r') { i++; continue; }
    if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; continue; }
    field += c; i++;
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  if (rows.length && rows[rows.length-1].length === 1 && rows[rows.length-1][0] === '') rows.pop();
  return rows;
}

function parseExercisesField(s) {
  if (!s || !s.trim()) return [];
  return s.split('|').map(part => {
    const t = part.trim();
    if (!t) return null;
    const m = t.match(/^(.+?)\s+(\d+)\s*[×x]\s*(.+)$/);
    if (m) return { name: m[1].trim(), sets: parseInt(m[2], 10), reps: m[3].trim() };
    return { name: t };
  }).filter(Boolean);
}

function csvRowToDay(headers, row, existing) {
  const obj = {};
  headers.forEach((h, i) => { obj[h] = (row[i] ?? '').trim(); });
  if (!obj.date || !/^\d{4}-\d{2}-\d{2}$/.test(obj.date)) {
    throw new Error(`Row missing valid date: ${obj.date || '(blank)'}`);
  }
  const base = existing || { date: obj.date, completed: false, feedback: '', loggedExtras: [] };
  const day = {
    ...base,
    date: obj.date,
    type: obj.type || base.type || 'easy',
    title: obj.title || base.title || '',
    shoe: obj.shoe || base.shoe || '',
    tag: obj.tag || base.tag || '',
    feedback: obj.feedback ?? base.feedback ?? '',
    completed: obj.completed === 'YES' || obj.completed === 'true' || obj.completed === '1',
  };
  if (obj.run_distance || obj.run_zone || obj.run_pace || obj.run_detail) {
    day.run = { distance: obj.run_distance || '', zone: obj.run_zone || '', pace: obj.run_pace || '', detail: obj.run_detail || '' };
  } else { delete day.run; }
  if (obj.strength_duration) day.strength = { duration: obj.strength_duration };
  else delete day.strength;
  day.exercises = parseExercisesField(obj.exercises);
  if (obj.logged_extras && obj.logged_extras.trim()) {
    const notes = obj.logged_extras.split('|').map(s => s.trim()).filter(Boolean);
    day.loggedExtras = notes.map((note, idx) => ({
      id: Date.now() + idx, note, kind: '', distance: '', duration: '',
      when: new Date().toISOString(),
    }));
  } else {
    day.loggedExtras = base.loggedExtras || [];
  }
  return day;
}

function csvToPlan(text, existingPlan) {
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error('CSV is empty or has no data rows.');
  const headers = rows[0].map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
  if (!headers.includes('date')) throw new Error('CSV missing required column: date');
  const existingMap = {};
  if (existingPlan?.days) existingPlan.days.forEach(d => { existingMap[d.date] = d; });
  const dateIdx = headers.indexOf('date');
  const days = rows.slice(1)
    .filter(r => r[dateIdx]?.trim()) // drop blank rows
    .map(row => csvRowToDay(headers, row, existingMap[row[dateIdx]?.trim()]));
  return {
    ...(existingPlan || { meta: { title: 'RUN PLAN', period: '', goalRaces: [], paceZones: [], shoes: [] } }),
    days: days.sort((a, b) => a.date.localeCompare(b.date)),
  };
}

function parseDistanceKm(s) {
  if (!s) return 0;
  const m = s.match(/(\d+(?:\.\d+)?)(?:\s*[–-]\s*(\d+(?:\.\d+)?))?\s*km/i);
  if (!m) return 0;
  return m[2] ? parseFloat(m[2]) : parseFloat(m[1]);
}

function weeklyVolume(days) {
  let totalKm = 0, runs = 0, strength = 0, completed = 0;
  days.forEach(d => {
    if (d.run?.distance) { totalKm += parseDistanceKm(d.run.distance); runs++; }
    if (d.strength) strength++;
    if (d.completed) completed++;
    (d.loggedExtras || []).forEach(x => {
      if (x.distance) totalKm += parseDistanceKm(x.distance);
    });
  });
  return { totalKm: Math.round(totalKm * 10) / 10, runs, strength, completed, total: days.length };
}

function daysUntil(targetIso, fromIso) {
  const a = new Date(targetIso);
  const b = new Date(fromIso);
  return Math.round((a - b) / (1000 * 60 * 60 * 24));
}

// ---------- MAIN APP ----------
function App() {
  const [plan, setPlan] = useState(initialPlan);
  const [view, setView] = useState('weekly'); // daily | weekly | monthly
  const [cursor, setCursor] = useState(isoToday()); // current focus date — opens on today
  const [editing, setEditing] = useState(null); // { dateStr } currently editing
  const [showImport, setShowImport] = useState(false);
  const [showExport, setShowExport] = useState(false);
  const [videoExercise, setVideoExercise] = useState(null);
  const [logging, setLogging] = useState(null); // date being logged
  const [showShoes, setShowShoes] = useState(false);
  const [slideKey, setSlideKey] = useState(0); // forces re-render for slide animation
  const [slideDir, setSlideDir] = useState(null); // 'left' | 'right' | null
  const fileRef = useRef(null);
  const touchRef = useRef(null);

  // ---------- HYDRATION & PERSISTENCE ----------
  const [hydrated, setHydrated] = useState(false);
  const [showSync, setShowSync] = useState(false);
  const [coachScript, setCoachScript] = useState(null); // active workout player
  const [showViewMenu, setShowViewMenu] = useState(false);
  const [coachLoading, setCoachLoading] = useState(false);
  const [syncStatus, setSyncStatus] = useState({ syncing: false, signedIn: false, lastSync: null });

  // Load saved plan on first mount. If none exists, the seeded initialPlan is kept
  // and saved immediately so subsequent launches restore it.
  useEffect(() => {
    let cancelled = false;
    (async () => {
      const stored = await localLoadPlan();
      if (!cancelled) {
        if (stored && stored.days?.length) {
          setPlan(stored);
        } else {
          await localSavePlan(initialPlan);
        }
        const meta = await getMeta();
        if (meta.lastView === 'weekly' || meta.lastView === 'monthly' || meta.lastView === 'daily') {
          setView(meta.lastView);
        }
        const signedIn = await driveIsSignedIn();
        setSyncStatus(s => ({ ...s, signedIn, lastSync: meta.lastDriveSync ?? null }));
        setHydrated(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // Auto-save on every plan change after hydration. We debounce slightly to
  // collapse rapid edits (e.g. typing into the feedback textarea).
  useEffect(() => {
    if (!hydrated) return;
    const t = setTimeout(() => { localSavePlan(plan).catch(console.error); }, 300);
    return () => clearTimeout(t);
  }, [plan, hydrated]);

  // Remember the last-used view so the next launch restores it.
  useEffect(() => {
    if (!hydrated) return;
    try {
      const meta = JSON.parse(localStorage.getItem(META_KEY) || '{}');
      meta.lastView = view;
      localStorage.setItem(META_KEY, JSON.stringify(meta));
    } catch {}
  }, [view, hydrated]);

  // ---------- DRIVE SYNC ACTIONS ----------
  const handleDriveSignIn = async () => {
    alert('Drive sync is disabled in the standalone HTML build. Use the Capacitor Android build for Drive sync. Your data still persists in this browser via localStorage.');
  };
  const handleDriveSignOut = async () => {};
  const handlePushToDrive = async () => {
    alert('Drive sync is disabled in the standalone HTML build.');
  };
  const handlePullFromDrive = async () => {
    alert('Drive sync is disabled in the standalone HTML build.');
  };

  // ---------- AI COACH ----------
  const handleStartCoach = async (day) => {
    setCoachLoading(true);
    try {
      // Standalone HTML: skip backend, use offline deterministic script
      const exercises = (day.exercises || []).filter(e => e.name && e.name.trim());
      const script = buildFallbackScript(day, exercises, 60);
      setTimeout(() => { setCoachScript(script); setCoachLoading(false); }, 250);
    } catch (err) {
      alert('Could not generate workout: ' + err.message);
      setCoachLoading(false);
    }
  };

  const dayMap = useMemo(() => {
    const m = {};
    plan.days.forEach(d => { m[d.date] = d; });
    return m;
  }, [plan.days]);

  const updateDay = (date, patch) => {
    setPlan(p => ({
      ...p,
      days: p.days.map(d => d.date === date ? { ...d, ...patch } : d)
    }));
  };

  const toggleComplete = (date) => {
    const d = dayMap[date];
    if (!d) return;
    updateDay(date, { completed: !d.completed });
  };

  const stats = useMemo(() => {
    const total = plan.days.length;
    const done = plan.days.filter(d => d.completed).length;
    const upcoming = plan.days.filter(d => !d.completed && d.date >= isoToday()).length;
    return { total, done, upcoming, pct: total ? Math.round((done/total)*100) : 0 };
  }, [plan.days]);

  // ---------- EXPORT / IMPORT ----------
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(plan, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `run-plan-${isoToday()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setShowExport(false);
  };

  // Compact export of past, meaningful days for feeding back into an LLM
  // to regenerate the next phase of the plan based on what actually happened.
  const exportHistory = () => {
    const today = isoToday();
    const past = (plan.days || []).filter(d => d.date < today);

    // Keep only days where SOMETHING happened: completion, exercise checks, notes,
    // feedback, or logged extras. Skip empty rest days etc.
    const meaningful = past.filter(d => {
      const hasExerciseDone = d.exerciseDone && Object.values(d.exerciseDone).some(Boolean);
      const hasExerciseNotes = d.exerciseNotes && Object.values(d.exerciseNotes).some(v => v && v.trim());
      const hasFeedback = d.feedback && d.feedback.trim();
      const hasLogged = (d.loggedExtras || []).length > 0;
      return d.completed || hasExerciseDone || hasExerciseNotes || hasFeedback || hasLogged;
    });

    // Build slim per-day records — strip coaching content, keep only what reflects reality
    const slim = meaningful.map(d => {
      const rec = {
        date: d.date,
        day_of_week: dayName(d.date),
        planned: {
          type: d.type,
          title: d.title,
        },
        actual: {
          completed: !!d.completed,
        },
      };
      if (d.tag)             rec.planned.tag = d.tag;
      if (d.run)             rec.planned.run = d.run;       // small, useful
      if (d.strength)        rec.planned.strength = d.strength;
      if (d.shoe && d.shoe !== '—') rec.planned.shoe = d.shoe;

      // Slim exercises — strip coaching, keep prescription + completion + user notes
      if (d.exercises && d.exercises.length) {
        const done = d.exerciseDone || {};
        const notes = d.exerciseNotes || {};
        rec.planned.exercises = d.exercises.map((e, i) => {
          const slimEx = { name: e.name };
          if (e.sets) slimEx.sets = e.sets;
          if (e.reps) slimEx.reps = e.reps;
          if (e.tempo) slimEx.tempo = e.tempo;
          if (done[i]) slimEx.done = true;
          if (notes[i] && notes[i].trim()) slimEx.my_note = notes[i].trim();
          return slimEx;
        });
      }

      if (d.feedback && d.feedback.trim()) rec.actual.feedback = d.feedback.trim();
      if (d.loggedExtras && d.loggedExtras.length) {
        rec.actual.logged_extras = d.loggedExtras.map(x => {
          const o = {};
          if (x.kind)     o.kind = x.kind;
          if (x.distance) o.distance = x.distance;
          if (x.duration) o.duration = x.duration;
          if (x.note)     o.note = x.note;
          return o;
        });
      }
      return rec;
    });

    // Summary stats over the window
    const dateFrom = meaningful.length ? meaningful[0].date : null;
    const dateTo = meaningful.length ? meaningful[meaningful.length - 1].date : null;
    const completedCount = meaningful.filter(d => d.completed).length;
    const totalExercisesDone = meaningful.reduce((sum, d) => {
      return sum + Object.values(d.exerciseDone || {}).filter(Boolean).length;
    }, 0);

    const out = {
      meta: {
        exported_at: new Date().toISOString(),
        purpose: 'Training history for plan regeneration. Past, meaningful days only. Use this to update or extend the plan based on what actually happened.',
        plan_title: plan.meta?.title || 'Training plan',
        plan_period: plan.meta?.period,
        races: plan.meta?.races || [],
        window: { from: dateFrom, to: dateTo, days_with_activity: meaningful.length },
        summary: {
          sessions_completed: completedCount,
          exercises_checked_off: totalExercisesDone,
        },
      },
      history: slim,
    };

    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `training-history-${isoToday()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setShowExport(false);
  };

  const exportCSV = () => {
    const headers = ['date','day_of_week','type','title','run_distance','run_zone','run_pace','run_detail','strength_duration','exercises','shoe','tag','completed','feedback','logged_extras'];
    const escape = (v) => {
      const s = (v ?? '').toString().replace(/"/g, '""');
      return `"${s}"`;
    };
    const rows = plan.days.map(d => [
      d.date,
      dayName(d.date),
      d.type,
      d.title,
      d.run?.distance || '',
      d.run?.zone || '',
      d.run?.pace || '',
      d.run?.detail || '',
      d.strength?.duration || '',
      (d.exercises||[]).map(e => `${e.name}${e.sets?` ${e.sets}×${e.reps}`:''}`).join(' | '),
      d.shoe || '',
      d.tag || '',
      d.completed ? 'YES' : 'NO',
      d.feedback || '',
      (d.loggedExtras||[]).map(x => x.note).join(' | ')
    ].map(escape).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `run-plan-${isoToday()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    setShowExport(false);
  };

  const importFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    const isCsv = file.name.toLowerCase().endsWith('.csv') || file.type === 'text/csv';
    reader.onload = (ev) => {
      const text = ev.target.result;
      try {
        if (isCsv) {
          const updated = csvToPlan(text, plan);
          setPlan(updated);
          setShowImport(false);
        } else {
          const parsed = JSON.parse(text);
          if (!parsed.days || !Array.isArray(parsed.days)) {
            alert('Invalid plan file: missing "days" array.');
            return;
          }

          // Build a lookup of the current plan's user-generated data, keyed by date
          const existingByDate = {};
          // Pinned exercise videos, keyed by date then exercise name, so manually
          // entered links survive importing a regenerated plan that lacks them.
          const existingVideos = {};
          (plan.days || []).forEach(d => {
            const userFields = {};
            if (d.completed)          userFields.completed = d.completed;
            if (d.feedback)           userFields.feedback = d.feedback;
            if (d.loggedExtras?.length) userFields.loggedExtras = d.loggedExtras;
            if (d.exerciseNotes && Object.keys(d.exerciseNotes).length)
                                      userFields.exerciseNotes = d.exerciseNotes;
            if (d.exerciseDone && Object.keys(d.exerciseDone).length)
                                      userFields.exerciseDone = d.exerciseDone;
            if (Object.keys(userFields).length) existingByDate[d.date] = userFields;
            const vids = {};
            (d.exercises || []).forEach(ex => { if (ex.name && ex.video) vids[ex.name] = ex.video; });
            if (Object.keys(vids).length) existingVideos[d.date] = vids;
          });

          // Count how many days have data worth preserving
          const daysWithNotes = Object.values(existingByDate).filter(u =>
            u.exerciseNotes || u.feedback || u.loggedExtras?.length || u.exerciseDone
          ).length;
          const daysCompleted = Object.values(existingByDate).filter(u => u.completed).length;
          const daysWithVideos = Object.keys(existingVideos).length;

          // Build confirm message
          const lines = [`Import "${file.name}"?`, ''];
          lines.push(`${parsed.days.length} days in the new file.`);
          if (daysWithNotes > 0 || daysCompleted > 0 || daysWithVideos > 0) {
            lines.push('');
            lines.push('Your existing data that will be KEPT:');
            if (daysCompleted > 0)  lines.push(`  ✓ ${daysCompleted} session(s) marked complete`);
            if (daysWithNotes > 0)  lines.push(`  ✓ Exercise notes & logs on ${daysWithNotes} day(s)`);
            if (daysWithVideos > 0) lines.push(`  ✓ Pinned exercise videos on ${daysWithVideos} day(s)`);
            lines.push('');
            lines.push('Plan structure (exercises, warmups, titles) will be updated from the file.');
          } else {
            lines.push('No existing notes or completed sessions found — safe to import.');
          }

          if (!window.confirm(lines.join('\n'))) return;

          // Merge: incoming structure + preserved user fields for matching dates.
          // Pinned videos are re-attached by exercise name; a link in the incoming
          // file wins over a previously pinned one.
          const mergedDays = parsed.days.map(incoming => {
            const existing = existingByDate[incoming.date] || {};
            const vids = existingVideos[incoming.date];
            let exercises = incoming.exercises;
            if (exercises && vids) {
              exercises = exercises.map(ex =>
                (!ex.video && ex.name && vids[ex.name]) ? { ...ex, video: vids[ex.name] } : ex
              );
            }
            return { ...incoming, ...existing, ...(exercises ? { exercises } : {}) };
          });

          setPlan({ ...parsed, days: mergedDays });
          // Jump the calendar to the imported plan's first day so the user
          // immediately sees what they imported (a coach plan for next week
          // would otherwise land on today's empty "no session" state).
          const firstDate = mergedDays.map(d => d.date).filter(Boolean).sort()[0];
          if (firstDate) setCursor(firstDate);
          setShowImport(false);
        }
      } catch (err) {
        alert('Could not parse file: ' + err.message);
      }
    };
    reader.readAsText(file);
    // Reset input so re-importing the same file works
    e.target.value = '';
  };

  // ---------- NAVIGATION ----------
  // dir > 0 = forward in time (next), dir < 0 = backward (prev)
  const navigate = (dir) => {
    setSlideDir(dir > 0 ? 'forward' : 'back');
    setSlideKey(k => k + 1);
    if (view === 'daily') setCursor(addDays(cursor, dir));
    else if (view === 'weekly') setCursor(addDays(cursor, dir * 7));
    else setCursor(addDays(cursor, dir * 30));
  };

  const goToday = () => {
    setSlideDir(null);
    setSlideKey(k => k + 1);
    setCursor(isoToday());
  };

  // Reset animation when switching views so the new view fades in cleanly
  const switchView = (v) => {
    if (v === view) return;
    setSlideDir(null);
    setSlideKey(k => k + 1);
    setView(v);
  };

  // ---------- SWIPE HANDLING ----------
  const SWIPE_MIN = 50;       // minimum horizontal distance in px
  const SWIPE_MAX_VERTICAL_RATIO = 0.5; // |dy| must be <= 0.5 * |dx|

  const onTouchStart = (e) => {
    // Don't start swipe if user is interacting with an input/textarea/button
    const t = e.target;
    if (t.closest('input, textarea, select, button, a')) {
      touchRef.current = null;
      return;
    }
    const touch = e.touches[0];
    touchRef.current = { x: touch.clientX, y: touch.clientY, t: Date.now() };
  };

  const onTouchEnd = (e) => {
    const start = touchRef.current;
    touchRef.current = null;
    if (!start) return;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - start.x;
    const dy = touch.clientY - start.y;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (absDx < SWIPE_MIN) return;
    if (absDy > absDx * SWIPE_MAX_VERTICAL_RATIO) return;
    // Swipe left (dx negative) = go forward; swipe right = go back
    navigate(dx < 0 ? 1 : -1);
  };

  return (
    <div className="min-h-screen bg-[#f5f3ee] text-[#0a0a0a]" style={{ fontFamily: '"Space Grotesk", -apple-system, sans-serif' }}>
      {/* fonts + decoration */}
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

      {/* HEADER — Bandit editorial style */}
      <header className="sticky top-0 z-30 bg-[#f5f3ee] border-b border-[#0a0a0a]">
        {/* Top metric strip — bib-number style */}
        <div className="flex items-stretch border-b border-[#0a0a0a]/15 text-[10px] font-mono uppercase tracking-[0.15em]">
          <div className="flex-1 px-3 py-1.5 border-r border-[#0a0a0a]/15 flex items-center justify-between">
            <span className="text-[#0a0a0a]/50">SESSIONS</span>
            <span className="font-bold tabular-nums">{String(stats.done).padStart(2,'0')}/{String(stats.total).padStart(2,'0')}</span>
          </div>
          <div className="flex-1 px-3 py-1.5 flex items-center justify-between">
            <span className="text-[#0a0a0a]/50">COMPLETE</span>
            <span className="font-bold tabular-nums">{String(stats.pct).padStart(2,'0')}%</span>
          </div>
        </div>

        <div className="px-4 py-3">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              {/* Wordmark — custom drawn paths, fully scalable */}
              <svg
                viewBox="0 0 525 130"
                className="block h-[44px] w-auto mt-1"
                aria-label="RE/RΔN"
                role="img"
              >
                <g transform="skewX(-9)" fill="#0a0a0a">
                  {/* R #1 */}
                  <rect x="20" y="10" width="22" height="100" />
                  <rect x="20" y="10" width="70" height="22" />
                  <rect x="20" y="54" width="70" height="22" />
                  <rect x="68" y="10" width="22" height="66" />
                  <polygon points="68,76 90,76 100,110 78,110" />
                  {/* E */}
                  <rect x="106" y="10" width="22" height="100" />
                  <rect x="106" y="10" width="72" height="22" />
                  <rect x="106" y="54" width="60" height="22" />
                  <rect x="106" y="88" width="72" height="22" />
                </g>
                {/* Slash */}
                <polygon points="222,10 250,10 200,110 172,110" fill="#c8202b" />
                <g transform="skewX(-9)" fill="#0a0a0a">
                  {/* R #2 */}
                  <rect x="265" y="10" width="22" height="100" />
                  <rect x="265" y="10" width="70" height="22" />
                  <rect x="265" y="54" width="70" height="22" />

                aria-label="Drive sync"

                {syncStatus.signedIn ? <Icon name="Cloud" size={16} /> : <Icon name="CloudOff" size={16} />}

              </button>
              <button onClick={() => setShowShoes(true)} className="p-2 border border-[#0a0a0a]/30 hover:border-[#0a0a0a] active:scale-95 transition" aria-label="Settings">
                <Icon name="Settings" size={16} />
              </button>
              <button onClick={() => setShowExport(true)} className="p-2 border border-[#0a0a0a]/30 hover:border-[#0a0a0a] active:scale-95 transition" aria-label="Export">
                <Icon name="Download" size={16} />
              </button>
              <button onClick={() => setShowImport(true)} className="p-2 border border-[#0a0a0a]/30 hover:border-[#0a0a0a] active:scale-95 transition" aria-label="Import">
                <Icon name="Upload" size={16} />
              </button>
              {/* Date navigation chevrons */}
              <button onClick={() => navigate(-1)} className="p-2 border border-[#0a0a0a]/40 hover:border-[#0a0a0a] active:scale-95 transition" aria-label="Previous">
                <Icon name="ChevronLeft" size={16} />
              </button>
              <button onClick={() => navigate(1)} className="p-2 border border-[#0a0a0a]/40 hover:border-[#0a0a0a] active:scale-95 transition" aria-label="Next">
                <Icon name="ChevronRight" size={16} />
              </button>
              {/* View switcher dropdown */}
              <div className="relative">
                <button
                  onClick={() => setShowViewMenu(v => !v)}
                  className="p-2 border border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee] hover:bg-[#c8202b] hover:border-[#c8202b] active:scale-95 transition flex items-center gap-1"
                  aria-label="Change view"
                >
                  <Icon name="Calendar" size={14} />
                  <Icon name="ChevronDown" size={10} className={`transition-transform ${showViewMenu ? 'rotate-180' : ''}`} />
                </button>
                {showViewMenu && (
                  <>
                    {/* backdrop */}
                    <div className="fixed inset-0 z-30" onClick={() => setShowViewMenu(false)} />
                    {/* menu */}
                    <div className="absolute right-0 top-full mt-1 z-40 bg-[#f5f3ee] border-2 border-[#0a0a0a] min-w-[120px] shadow-xl">
                      {['daily','weekly','monthly'].map(v => (
                        <button
                          key={v}
                          onClick={() => { switchView(v); setShowViewMenu(false); }}
                          className={`w-full px-3 py-2 text-left text-[10px] font-bold uppercase tracking-[0.2em] active:bg-[#0a0a0a]/5 transition ${view === v ? 'bg-[#0a0a0a] text-[#f5f3ee]' : 'text-[#0a0a0a]'}`}
                        >
                          {view === v && <span className="text-[#c8202b] mr-1.5">●</span>}
                          {v}
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>

          {/* Progress bar — full width */}
          <div className="mt-3 h-[3px] bg-[#0a0a0a]/10 relative overflow-hidden">
            <div className="absolute inset-y-0 left-0 bg-[#0a0a0a] transition-all duration-700" style={{ width: `${stats.pct}%` }} />
          </div>
        </div>

        {/* Marquee strip — Bandit signature element */}
        <div className="border-t border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee] overflow-hidden">
          <div className="flex whitespace-nowrap py-1.5 marquee" style={{ fontFamily: '"Anton", sans-serif' }}>
            {(() => {
              const mantras = (plan.meta.mantras && plan.meta.mantras.length) ? plan.meta.mantras : DEFAULT_MANTRAS;
              return Array.from({length: 8}).map((_, i) => (
                <span key={i} className="text-sm tracking-[0.15em] px-3 shrink-0">
                  {mantras.map((m, j) => (
                    <React.Fragment key={j}>{m} <span className="text-[#c8202b]">→</span> </React.Fragment>
                  ))}
                </span>
              ));
            })()}
          </div>
        </div>
      </header>

      {/* MAIN CONTENT */}
      <main
        className="px-4 py-4 pb-24 overflow-hidden touch-pan-y select-none"
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div
          key={`${view}-${slideKey}`}
          className={`slide-${slideDir || 'static'}`}
        >
          {view === 'daily' && (
            <DailyView
              date={cursor}
              day={dayMap[cursor]}
              onToggle={toggleComplete}
              onEdit={(d) => setEditing(d)}
              onVideo={setVideoExercise}
              onLog={(d) => setLogging(d)}
              onCoach={() => dayMap[cursor] && handleStartCoach(dayMap[cursor])}
              updateDay={updateDay}
            />
          )}
          {view === 'weekly' && (
            <WeeklyView
              cursor={cursor}
              dayMap={dayMap}
              onTap={(date) => { setCursor(date); switchView('daily'); }}
              onToggle={toggleComplete}
            />
          )}
          {view === 'monthly' && (
            <MonthlyView
              cursor={cursor}
              dayMap={dayMap}
              onTap={(date) => { setCursor(date); switchView('daily'); }}
            />
          )}
        </div>

        {/* Swipe hint */}
        <div className="text-center mt-6 text-[9px] font-mono uppercase tracking-[0.3em] text-[#0a0a0a]/30 pointer-events-none">
          ← SWIPE TO NAVIGATE →
        </div>
      </main>

      <style>{`
        @keyframes slideInForward {
          from { opacity: 0; transform: translateX(40px); }
          to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInBack {
          from { opacity: 0; transform: translateX(-40px); }
          to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeStatic {
          from { opacity: 0; }
          to   { opacity: 1; }
        }
        @keyframes marqueeScroll {
          from { transform: translateX(0); }
          to   { transform: translateX(-50%); }
        }
        .slide-forward { animation: slideInForward 0.28s cubic-bezier(0.22, 1, 0.36, 1); }
        .slide-back    { animation: slideInBack    0.28s cubic-bezier(0.22, 1, 0.36, 1); }
        .slide-static  { animation: fadeStatic     0.2s ease; }
        .marquee       { animation: marqueeScroll 40s linear infinite; will-change: transform; }
      `}</style>

      {/* MODALS */}
      {editing && (
        <EditModal
          day={dayMap[editing]}
          shoes={plan.meta.shoes || []}
          onClose={() => setEditing(null)}
          onSave={(patch) => { updateDay(editing, patch); setEditing(null); }}
        />
      )}
      {logging && (
        <LogModal
          day={dayMap[logging]}
          onClose={() => setLogging(null)}
          onSave={(entry) => {
            const d = dayMap[logging];
            updateDay(logging, { loggedExtras: [...(d.loggedExtras || []), entry] });
            setLogging(null);
          }}
        />
      )}
      {showShoes && (
        <SettingsModal
          shoes={plan.meta.shoes || []}
          mantras={plan.meta.mantras ?? DEFAULT_MANTRAS}
          onClose={() => setShowShoes(false)}
          onSave={({ shoes, mantras }) => {
            setPlan(p => ({ ...p, meta: { ...p.meta, shoes, mantras } }));
            setShowShoes(false);
          }}
        />
      )}
      {showImport && (
        <ImportModal
          onClose={() => setShowImport(false)}
          onPick={() => fileRef.current?.click()}
          onStartFresh={() => {
            if (!window.confirm('Start fresh?\n\nThis clears the current plan from THIS device (including any logged notes/completions for it) so you can import your own. This cannot be undone.')) return;
            setPlan({ days: [], meta: {} });
            setCursor(isoToday());
            setShowImport(false);
          }}
        />
      )}
      {showExport && (
        <ExportModal onClose={() => setShowExport(false)} onJSON={exportJSON} onCSV={exportCSV} onHistory={exportHistory} />
      )}
      {videoExercise && (
        <VideoModal exercise={videoExercise} onClose={() => setVideoExercise(null)} />
      )}
      {showSync && (
        <SyncModal
          status={syncStatus}
          onClose={() => setShowSync(false)}
          onSignIn={handleDriveSignIn}
          onSignOut={handleDriveSignOut}
          onPush={handlePushToDrive}
          onPull={handlePullFromDrive}
        />
      )}
      {coachLoading && (
        <div className="fixed inset-0 z-50 bg-[#0a0a0a]/90 flex flex-col items-center justify-center">
          <div className="border-2 border-[#f5f3ee] bg-[#f5f3ee] text-[#0a0a0a] px-8 py-6">
            <p className="text-[10px] font-mono uppercase tracking-[0.3em] text-[#c8202b] mb-2">— COACH —</p>
            <p className="text-2xl font-bold uppercase" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.05em' }}>BUILDING WORKOUT</p>
            <div className="mt-3 h-[2px] bg-[#0a0a0a]/10 overflow-hidden">
              <div className="h-full bg-[#c8202b] w-1/3 marquee" style={{ animationDuration: '1.5s' }} />
            </div>
          </div>
        </div>
      )}
      {coachScript && (
        <WorkoutPlayer script={coachScript} onClose={() => setCoachScript(null)} />
      )}
      <input ref={fileRef} type="file" accept=".json,.csv,application/json,text/csv" className="hidden" onChange={importFile} />
    </div>
  );
}

// ---------- DAILY VIEW ----------
function DailyView({ date, day, onToggle, onEdit, onVideo, onLog, onCoach, onZones, updateDay }) {
  if (!day) {
    return (
      <div className="flex flex-col items-center justify-center py-20 text-center">
        <Icon name="Calendar" size={40} className="text-slate-600 mb-3" />
        <p className="text-slate-400 text-sm">No session planned for this day.</p>
        <p className="text-slate-500 text-xs mt-1">{fmtDate(date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}</p>
      </div>
    );
  }

  const style = ts(day.type);
  const iconName = style.icon;
  const isDark = style.text.includes('f5f3ee');

  return (
    <div className="space-y-5">
      {/* Date hero — editorial style */}
      <div className="flex items-end justify-between border-b-2 border-[#0a0a0a] pb-3">
        <div>
          <p className="text-[10px] font-mono uppercase tracking-[0.25em] text-[#0a0a0a]/60">
            {dayName(date)} · WK {Math.ceil((fmtDate(date).getDate() + new Date(fmtDate(date).getFullYear(), 0, 1).getDay()) / 7)}
          </p>
          <h2 className="text-[64px] leading-[0.85] mt-1" style={{ fontFamily: '"Anton", sans-serif' }}>
            {monthName(date).toUpperCase()} {dayNumber(date)}
          </h2>
        </div>
        <button
          onClick={() => onToggle(date)}
          className={`flex items-center gap-2 px-3 py-2 transition active:scale-95 border-2 ${day.completed ? 'bg-[#0a0a0a] text-[#f5f3ee] border-[#0a0a0a]' : 'bg-[#f5f3ee] text-[#0a0a0a] border-[#0a0a0a]'}`}
        >
          {day.completed ? <Icon name="CheckCircle2" size={16} /> : <Icon name="Circle" size={16} />}
          <span className="text-[10px] font-bold uppercase tracking-[0.2em]">{day.completed ? 'DONE' : 'MARK'}</span>
        </button>
      </div>

      {/* Session card — flat, editorial */}
      <div className={`relative ${style.bg} border-2 ${style.border} overflow-hidden ${isDark ? 'text-[#f5f3ee]' : 'text-[#0a0a0a]'}`}>
        {/* Top tag bar */}
        <div className={`flex items-stretch border-b-2 ${style.border}`}>
          <div className="flex-1 px-4 py-2 flex items-center gap-2">
            <Icon name={iconName} size={14} />
            <span className="text-[10px] uppercase tracking-[0.25em] font-bold">{style.label}</span>
          </div>
          <button onClick={() => onEdit(date)} className={`px-3 border-l-2 ${style.border} ${isDark ? 'hover:bg-white/10' : 'hover:bg-black/10'} transition`}>
            <Icon name="Edit3" size={14} />
          </button>
        </div>

        <div className="p-5">
          <h3 className="text-[28px] leading-[0.95]" style={{ fontFamily: '"Anton", sans-serif', letterSpacing: '0.01em' }}>{day.title.toUpperCase()}</h3>

          {day.run && (
            <div className="mt-4 space-y-2">
              {/* Big distance — bib number style */}
              <div className="flex items-baseline gap-3 flex-wrap">
                <span className="text-[56px] leading-[0.95] tabular-nums break-words max-w-full" style={{ fontFamily: '"Anton", sans-serif' }}>{day.run.distance}</span>
              </div>
              {/* Data row */}
              <div className="flex items-center gap-3 text-[10px] font-mono uppercase tracking-[0.15em] flex-wrap">
                {day.run.zone && (
                  <button
                    onClick={() => onZones && onZones()}
                    className={`px-2 py-1 border ${isDark ? 'border-[#f5f3ee]/40 hover:border-[#f5f3ee]' : 'border-[#0a0a0a]/40 hover:border-[#0a0a0a]'} active:scale-95 transition font-bold`}
                  >
                    ZONE {day.run.zone}
                  </button>
                )}
                {day.run.pace && <span className="opacity-70">PACE · {day.run.pace}/KM</span>}
              </div>
              {day.run.detail && <p className="text-sm leading-relaxed mt-2 opacity-85">{day.run.detail}</p>}
            </div>
          )}

          {day.strength && (
            <div className="mt-4 flex items-baseline gap-3">
              <span className="text-[56px] leading-[0.95] tabular-nums break-words max-w-full" style={{ fontFamily: '"Anton", sans-serif' }}>{day.strength.duration}</span>
              <span className="text-[10px] font-mono uppercase tracking-[0.2em] opacity-70">SESSION</span>
            </div>
          )}

          {day.shoe && day.shoe !== '—' && (
            <div className={`mt-4 pt-3 border-t ${isDark ? 'border-[#f5f3ee]/20' : 'border-[#0a0a0a]/20'}`}>
              <div className="flex items-center gap-2 text-[10px] font-mono uppercase tracking-[0.2em]">
                <span className="opacity-60">FOOTWEAR /</span>
                <span className="font-bold">{day.shoe.toUpperCase()}</span>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Session notes (overall session-level coaching) */}
      {day.sessionNotes && (
        <div className="border-2 border-[#0a0a0a] bg-[#1c2942] text-[#f5f3ee]">
          <div className="px-4 py-2 border-b border-[#f5f3ee]/20 flex items-center gap-2">
            <span className="text-[10px] uppercase tracking-[0.25em] font-bold">— SESSION BRIEF —</span>
          </div>
          <p className="px-4 py-3 text-sm leading-relaxed" style={{ fontFamily: '"Space Grotesk", sans-serif' }}>
            {day.sessionNotes}
          </p>
        </div>
      )}

      {/* Warmup section — collapsible */}
      {day.warmup && day.warmup.items && day.warmup.items.length > 0 && (
        <WarmupBlock warmup={day.warmup} />
      )}

      {/* RUN section — shown in the workout flow when a day pairs a run with exercises */}
      {day.run && day.exercises && day.exercises.length > 0 && (
        <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
          <div className="flex items-stretch border-b-2 border-[#0a0a0a]">
            <div className="flex-1 px-4 py-2 flex items-center gap-2">
              <Icon name="Footprints" size={14} />
              <span className="text-[10px] uppercase tracking-[0.25em] font-bold">RUN</span>
            </div>
            {day.run.zone && (
              <div className="px-4 py-2 border-l-2 border-[#0a0a0a] text-[10px] font-mono font-bold tracking-[0.15em]">
                ZONE {day.run.zone}
              </div>
            )}
          </div>
          <div className="px-4 py-3">
            <div className="flex items-baseline gap-3 flex-wrap">
              {day.run.distance && (
                <span className="text-[40px] leading-[0.95] tabular-nums break-words max-w-full" style={{ fontFamily: '"Anton", sans-serif' }}>{day.run.distance}</span>
              )}
              {day.run.pace && (
                <span className="text-[10px] font-mono uppercase tracking-[0.15em] text-[#0a0a0a]/60">PACE · {day.run.pace}/KM</span>
              )}
            </div>
            {day.run.detail && <p className="text-sm leading-relaxed mt-2 text-[#0a0a0a]/80">{day.run.detail}</p>}
          </div>
        </div>
      )}

      {/* Exercises section */}
      {day.exercises && day.exercises.length > 0 && (
        <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
          {/* Header bar */}
          <div className="flex items-stretch border-b-2 border-[#0a0a0a]">
            <div className="flex-1 px-4 py-2 flex items-center gap-2">
              <Icon name="Dumbbell" size={14} />
              <span className="text-[10px] uppercase tracking-[0.25em] font-bold">EXERCISES</span>
              {day.tag && (
                <span className="ml-1 px-2 py-0.5 bg-[#0a0a0a] text-[#f5f3ee] text-[9px] font-bold uppercase tracking-[0.2em]">
                  {day.tag.toUpperCase()}
                </span>
              )}
            </div>
            <div className="px-4 py-2 border-l-2 border-[#0a0a0a] text-[10px] font-mono font-bold tabular-nums">
              {(() => {
                const done = Object.values(day.exerciseDone || {}).filter(Boolean).length;
                return `${String(done).padStart(2,'0')}/${String(day.exercises.length).padStart(2,'0')}`;
              })()}
            </div>
          </div>

          {onCoach && (
            <button
              onClick={onCoach}
              className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-[#c8202b] text-[#f5f3ee] active:scale-[0.99] transition border-b-2 border-[#0a0a0a]"
            >
              <Icon name="Sparkles" size={14} />
              <span className="text-[11px] font-bold uppercase tracking-[0.25em]">START GUIDED WORKOUT</span>
              <Icon name="ChevronRight" size={14} />
            </button>
          )}

          <div>
            {day.exercises.map((ex, i) => (
              <ExerciseRow
                key={i}
                ex={ex}
                onVideo={() => onVideo(ex)}
                index={i + 1}
                isLast={i === day.exercises.length - 1}
                personalNote={(day.exerciseNotes || {})[i] || ''}
                onNoteChange={(text) => {
                  const next = { ...(day.exerciseNotes || {}), [i]: text };
                  updateDay(date, { exerciseNotes: next });
                }}
                done={!!(day.exerciseDone || {})[i]}
                onToggleDone={() => {
                  const next = { ...(day.exerciseDone || {}) };
                  if (next[i]) delete next[i]; else next[i] = true;
                  updateDay(date, { exerciseDone: next });
                }}
              />
            ))}
          </div>
        </div>
      )}

      {/* Cool-down section — collapsible */}
      {day.cooldown && day.cooldown.items && day.cooldown.items.length > 0 && (
        <CooldownBlock cooldown={day.cooldown} />
      )}

      {/* Logged extras */}
      <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
        <div className="flex items-stretch border-b-2 border-[#0a0a0a]">
          <div className="flex-1 px-4 py-2 flex items-center gap-2">
            <span className="text-[10px] uppercase tracking-[0.25em] font-bold">LOGGED ACTIVITY</span>
          </div>
          <button
            onClick={() => onLog(date)}
            className="px-4 py-2 border-l-2 border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee] hover:bg-[#c8202b] hover:border-[#c8202b] active:scale-95 transition flex items-center gap-1 text-[10px] font-bold uppercase tracking-[0.2em]"
          >
            <Icon name="Plus" size={12} /> LOG
          </button>
        </div>

        {(day.loggedExtras || []).length === 0 ? (
          <p className="px-4 py-4 text-[11px] font-mono uppercase tracking-[0.15em] text-[#0a0a0a]/40">— NO EXTRA ACTIVITY —</p>
        ) : (
          <div>
            {(day.loggedExtras || []).map((x, i, arr) => (
              <div key={x.id} className={`flex items-start justify-between gap-3 px-4 py-3 ${i < arr.length - 1 ? 'border-b border-[#0a0a0a]/15' : ''}`}>
                <div className="min-w-0 flex-1">
                  <div className="flex items-baseline gap-2 flex-wrap">
                    {x.kind && (
                      <span className="text-[9px] uppercase tracking-[0.2em] font-bold border border-[#0a0a0a] px-1.5 py-0.5">{x.kind}</span>
                    )}
                    {x.distance && (
                      <span className="text-xl tabular-nums" style={{ fontFamily: '"Anton", sans-serif' }}>{x.distance}</span>
                    )}
                    {x.duration && (
                      <span className="text-[10px] font-mono uppercase tracking-[0.15em] text-[#0a0a0a]/60">{x.duration}</span>
                    )}
                  </div>
                  {x.note && <p className="text-sm text-[#0a0a0a]/80 mt-1">{x.note}</p>}
                </div>
                <button
                  onClick={() => updateDay(date, { loggedExtras: day.loggedExtras.filter(e => e.id !== x.id) })}
                  className="text-[#0a0a0a]/30 hover:text-[#c8202b] transition shrink-0 p-1"
                >
                  <Icon name="Trash2" size={14} />
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Feedback */}
      <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
        <div className="px-4 py-2 border-b-2 border-[#0a0a0a] flex items-center gap-2">
          <span className="text-[10px] uppercase tracking-[0.25em] font-bold">FIELD NOTES</span>
        </div>
        <textarea
          value={day.feedback || ''}
          onChange={(e) => updateDay(date, { feedback: e.target.value })}
          placeholder="How did it feel? Pain · Energy · RPE..."
          rows={3}
          className="w-full bg-transparent border-0 px-4 py-3 text-sm text-[#0a0a0a] placeholder-[#0a0a0a]/30 focus:outline-none resize-none"
          style={{ fontFamily: '"Space Grotesk", sans-serif' }}
        />
      </div>
    </div>
  );
}

function SessionBlock({ data, fallbackTitle, accent }) {
  const [open, setOpen] = useState(false);
  if (!data || !data.items || data.items.length === 0) return null;
  return (
    <div className="border-2 border-[#0a0a0a] bg-[#f5f3ee]">
      <button
        onClick={() => setOpen(o => !o)}
        className="w-full flex items-stretch border-b-2 border-[#0a0a0a] active:bg-[#e8e4d9] transition"
      >
        <div className="flex-1 px-4 py-2 flex items-center gap-2 text-left">
          {accent && <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: accent }} />}
          <Icon name="Activity" size={14} />
          <span className="text-[10px] uppercase tracking-[0.25em] font-bold">{data.title || fallbackTitle}</span>
        </div>
        <div className="px-4 py-2 border-l-2 border-[#0a0a0a] flex items-center gap-1 text-[10px] font-mono font-bold tabular-nums">
          <span>{String(data.items.length).padStart(2,'0')}</span>
          <Icon name="ChevronDown" size={12} className={`transition-transform ${open ? 'rotate-180' : ''}`} />
        </div>
      </button>
      {open && (
        <div>
          {data.items.map((item, i) => (
            <div key={i} className={`px-4 py-2.5 ${i < data.items.length - 1 ? 'border-b border-[#0a0a0a]/15' : ''}`}>
              <div className="flex items-baseline gap-3">
                <span className="text-[10px] font-mono font-bold tabular-nums text-[#0a0a0a]/40 shrink-0 w-6">{String(i + 1).padStart(2,'0')}</span>
                <div className="min-w-0 flex-1">

                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CooldownBlock({ cooldown }) {

// Parse a timed duration out of a reps string like "30s", "30s each side", "10 holds × 5s", "60s each".
// Returns seconds, or null if not a timed exercise.
function parseTimedReps(reps) {
  if (!reps || typeof reps !== 'string') return null;
  // Pattern: "× 5s", "× 30s" etc — the multiplier-then-seconds form (10 holds × 5s)
  const mult = reps.match(/×\s*(\d+)\s*s\b/i);
  if (mult) return parseInt(mult[1], 10);
  // Pattern: bare "30s" or "30s each side"
  const bare = reps.match(/(\d+)\s*s\b/i);
  if (bare) return parseInt(bare[1], 10);
  return null;
}

// Self-contained timer component with countdown, pause/resume/reset, beep at end, wake lock.
// Parse a tempo string like "3s up · 1s hold · 3s down" or "2s up, 1s squeeze, 2s down"
// into an ordered array of phases. Returns null if the tempo is qualitative
// (e.g. "controlled, ~2s each direction") or empty.
function parseTempo(tempoStr) {
  if (!tempoStr || typeof tempoStr !== 'string') return null;

  // Bail on qualitative tempos that have no structured per-phase timing
  const qualitative = /^\s*(controlled|slow|land softly|static hold(\s|$))/i;
  if (qualitative.test(tempoStr)) return null;

  // Split on · or comma, normalize whitespace
  const parts = tempoStr.split(/[·,]/).map(p => p.trim()).filter(Boolean);

  const phases = [];
  for (const part of parts) {
    // Match "Ns word" or "N word" (e.g. "3s up", "1s hold", "2s squeeze")
    const m = part.match(/^(\d+)\s*s?\s+(.+)$/i);
    if (!m) continue;
    const seconds = parseInt(m[1], 10);
    let label = m[2].trim().toUpperCase();
    // Strip trailing words like "per rep"
    label = label.replace(/\s+PER\s+REP$/i, '');
    if (seconds > 0 && label.length > 0) {
      phases.push({ seconds, label });
    }
  }

  // Special case: a single "Ns hold" entry — treat as valid (e.g. "5s hold per rep")
  if (phases.length === 0) {
    const single = tempoStr.match(/(\d+)\s*s\s+hold/i);
    if (single) {
      return [{ seconds: parseInt(single[1], 10), label: 'HOLD' }];
    }
    return null;
  }

  return phases;
}

// Phase-coded color: UP/EXTEND/OUT = ascending blue, HOLD/SQUEEZE/PAUSE = red, DOWN/RETURN/BACK = neutral grey
function phaseColor(label) {
  const L = label.toUpperCase();
  if (/UP|EXTEND|OUT|LIFT/.test(L)) return '#1c2942';   // ink blue
  if (/HOLD|SQUEEZE|PAUSE/.test(L))  return '#c8202b';  // red
  if (/DOWN|RETURN|BACK|LOWER/.test(L)) return '#7a8a8d'; // steel
  return '#0a0a0a'; // default asphalt
}

// Beep helper — different frequencies per phase so ear can identify
function playPhaseBeep(label) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const L = label.toUpperCase();
    // High beep for UP, mid for HOLD, low for DOWN
    let freq = 660;
    if (/UP|EXTEND|OUT|LIFT/.test(L)) freq = 880;
    else if (/HOLD|SQUEEZE|PAUSE/.test(L)) freq = 660;
    else if (/DOWN|RETURN|BACK|LOWER/.test(L)) freq = 440;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  } catch {}
}

// Rep-tempo metronome: cycles through phases of a single rep, counts reps completed,
// audio-cues each phase transition, optional voice readout of phase name.
function RepTempoMetronome({ phases, targetReps, onClose }) {
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [secondsLeft, setSecondsLeft] = useState(phases[0].seconds);
  const [running, setRunning] = useState(true);
  const [repsDone, setRepsDone] = useState(0);
  const [voiceOn, setVoiceOn] = useState(true);
  const intervalRef = useRef(null);
  const wakeLockRef = useRef(null);

  const currentPhase = phases[phaseIdx];
  const totalRepSeconds = phases.reduce((a, p) => a + p.seconds, 0);
  const targetRepCount = parseInt(targetReps) || null;
  const isComplete = targetRepCount && repsDone >= targetRepCount;

  // Speak phase label using TTS
  const speak = (text) => {
    if (!voiceOn || !('speechSynthesis' in window)) return;
    try {
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.3;
      utter.pitch = 1.0;
      utter.volume = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utter);
    } catch {}
  };

  // Phase change effect: beep + speak
  useEffect(() => {
    if (!running) return;
    playPhaseBeep(currentPhase.label);
    speak(currentPhase.label);
  }, [phaseIdx, running]);

  // Tick
  useEffect(() => {
    if (!running || isComplete) {
      clearInterval(intervalRef.current);
      return;
    }
    intervalRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) {
          // Phase done — advance
          const nextIdx = (phaseIdx + 1) % phases.length;
          if (nextIdx === 0) {
            // Completed a full rep
            setRepsDone(r => r + 1);
          }
          setPhaseIdx(nextIdx);
          return phases[nextIdx].seconds;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running, phaseIdx, isComplete]);

  // Wake lock during run
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (running && !isComplete && 'wakeLock' in navigator && !wakeLockRef.current) {
        try {
          const lock = await navigator.wakeLock.request('screen');
          if (!cancelled) wakeLockRef.current = lock;
        } catch {}
      } else if ((!running || isComplete) && wakeLockRef.current) {
        try { await wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    }
    acquire();
    return () => {
      cancelled = true;
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    };
  }, [running, isComplete]);

  // Final beep on complete
  useEffect(() => {
    if (!isComplete) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.2, 0.4].forEach(t => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 880;
        osc.connect(gain);
        gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t + 0.15);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.2);
      });
      if (navigator.vibrate) navigator.vibrate([150, 80, 150, 80, 150]);
    } catch {}
  }, [isComplete]);

  const reset = () => {
    setPhaseIdx(0);
    setSecondsLeft(phases[0].seconds);
    setRepsDone(0);
    setRunning(true);
  };

  const phaseProgress = ((currentPhase.seconds - secondsLeft) / currentPhase.seconds) * 100;
  const color = phaseColor(currentPhase.label);

  return (
    <div className="border-2 border-[#0a0a0a] bg-[#0a0a0a] text-[#f5f3ee]">
      {/* Header */}
      <div className="flex items-stretch border-b border-[#f5f3ee]/20">
        <div className="flex-1 px-3 py-1.5 flex items-center gap-2">
          <Icon name="Activity" size={12} />
          <span className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold">REP TEMPO · {totalRepSeconds}s/REP</span>
        </div>
        <button
          onClick={() => setVoiceOn(v => !v)}
          className="px-3 border-l border-[#f5f3ee]/20 hover:bg-[#f5f3ee]/10 active:scale-95 transition"
          title={voiceOn ? 'Voice on' : 'Voice off'}
        >
          {voiceOn ? <Icon name="Volume2" size={12} /> : <Icon name="VolumeX" size={12} />}
        </button>
        <button onClick={onClose} className="px-3 border-l border-[#f5f3ee]/20 hover:bg-[#f5f3ee]/10 active:scale-95 transition">
          <Icon name="X" size={12} />
        </button>
      </div>

      {/* Main display */}
      {isComplete ? (
        <div className="px-3 py-4 text-center bg-[#c8202b]">
          <div className="text-[48px] leading-[0.85] font-bold" style={{ fontFamily: '"Anton", sans-serif' }}>SET DONE</div>
          <div className="text-[11px] font-mono uppercase tracking-[0.25em] mt-1 opacity-80">{repsDone} REPS COMPLETE</div>
        </div>
      ) : (
        <>
          {/* Phase label */}
          <div className="px-3 pt-3 text-center" style={{ background: color }}>
            <div className="text-[11px] font-mono uppercase tracking-[0.3em] opacity-80">— {currentPhase.label} —</div>
          </div>

          {/* Big countdown */}
          <div className="px-3 pb-2 pt-1 text-center" style={{ background: color }}>
            <div className="text-[80px] leading-[0.85] tabular-nums font-bold" style={{ fontFamily: '"Anton", sans-serif' }}>
              {secondsLeft}
            </div>
          </div>

          {/* Phase progress bar */}
          <div className="h-[3px] bg-[#f5f3ee]/15">
            <div className="h-full bg-[#f5f3ee] transition-[width] duration-1000 ease-linear" style={{ width: `${phaseProgress}%` }} />
          </div>

          {/* Stats row */}
          <div className="flex items-stretch border-t border-[#f5f3ee]/20 text-[10px] font-mono uppercase tracking-[0.2em]">
            <div className="flex-1 px-3 py-1.5 flex items-center justify-between border-r border-[#f5f3ee]/20">
              <span className="opacity-60">REP</span>
              <span className="font-bold tabular-nums">
                {String(repsDone).padStart(2, '0')}{targetRepCount ? `/${String(targetRepCount).padStart(2,'0')}` : ''}
              </span>
            </div>
            <div className="flex-1 px-3 py-1.5 flex items-center justify-between">
              <span className="opacity-60">PHASE</span>
              <span className="font-bold tabular-nums">{phaseIdx + 1}/{phases.length}</span>
            </div>
          </div>
        </>
      )}

      {/* Controls */}
      <div className="flex items-stretch border-t border-[#f5f3ee]/20">
        {!isComplete ? (
          <>
            <button
              onClick={() => setRunning(r => !r)}
              className="flex-1 py-2 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
            >
              {running
                ? <><Icon name="Pause" size={12} fill="currentColor" /><span className="text-[10px] font-bold uppercase tracking-[0.2em]">PAUSE</span></>
                : <><Icon name="Play" size={12} fill="currentColor" /><span className="text-[10px] font-bold uppercase tracking-[0.2em]">RESUME</span></>
              }
            </button>
            <button
              onClick={reset}
              className="flex-1 py-2 border-l border-[#f5f3ee]/20 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
            >
              <Icon name="RefreshCw" size={12} />
              <span className="text-[10px] font-bold uppercase tracking-[0.2em]">RESET</span>
            </button>
          </>
        ) : (
          <button
            onClick={reset}
            className="flex-1 py-2 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
          >
            <Icon name="RefreshCw" size={12} />
            <span className="text-[10px] font-bold uppercase tracking-[0.2em]">NEXT SET</span>
          </button>
        )}
      </div>

      {/* Phase preview row — small */}
      <div className="flex items-stretch border-t border-[#f5f3ee]/20 text-[9px] font-mono">
        {phases.map((p, i) => (
          <div
            key={i}
            className={`flex-1 px-1.5 py-1 text-center uppercase tracking-[0.15em] ${i < phases.length - 1 ? 'border-r border-[#f5f3ee]/20' : ''} ${i === phaseIdx && !isComplete ? 'font-bold opacity-100' : 'opacity-40'}`}
          >
            {p.label} {p.seconds}s
          </div>
        ))}
      </div>
    </div>
  );
}

function Timer({ initialSeconds, label, onClose }) {
  const [secondsLeft, setSecondsLeft] = useState(initialSeconds);
  const [running, setRunning] = useState(true);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);
  const wakeLockRef = useRef(null);

  // Tick
  useEffect(() => {
    if (!running || done) {
      clearInterval(intervalRef.current);
      return;
    }
    intervalRef.current = setInterval(() => {
      setSecondsLeft(s => {
        if (s <= 1) {
          setDone(true);
          setRunning(false);
          // Beep using Web Audio API — no asset, works offline
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = 880;
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0.0001, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
            // Vibrate too if supported
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          } catch {}
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [running, done]);

  // Wake lock
  useEffect(() => {
    let cancelled = false;
    async function acquire() {
      if (running && !done && 'wakeLock' in navigator && !wakeLockRef.current) {
        try {
          const lock = await navigator.wakeLock.request('screen');
          if (!cancelled) wakeLockRef.current = lock;
        } catch {}
      } else if ((!running || done) && wakeLockRef.current) {
        try { await wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    }
    acquire();
    return () => {
      cancelled = true;
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    };
  }, [running, done]);

  const reset = () => {
    setSecondsLeft(initialSeconds);
    setDone(false);
    setRunning(true);
  };

  const progress = ((initialSeconds - secondsLeft) / initialSeconds) * 100;
  const mins = Math.floor(secondsLeft / 60);
  const secs = secondsLeft % 60;
  const display = mins > 0 ? `${mins}:${String(secs).padStart(2,'0')}` : String(secs);

  return (
    <div className={`border-2 ${done ? 'border-[#c8202b]' : 'border-[#0a0a0a]'} ${done ? 'bg-[#c8202b]' : 'bg-[#0a0a0a]'} text-[#f5f3ee]`}>
      {/* Header bar */}
      <div className="flex items-stretch border-b border-[#f5f3ee]/20">
        <div className="flex-1 px-3 py-1.5 flex items-center gap-2">
          <Icon name="Clock" size={12} />
          <span className="text-[9px] font-mono uppercase tracking-[0.25em] font-bold">{label || 'TIMER'}</span>
        </div>
        <button onClick={onClose} className="px-3 border-l border-[#f5f3ee]/20 hover:bg-[#f5f3ee]/10 active:scale-95 transition">
          <Icon name="X" size={12} />
        </button>
      </div>

      {/* Big number */}
      <div className="px-3 py-3 text-center">
        <div className="text-[72px] leading-[0.85] tabular-nums font-bold" style={{ fontFamily: '"Anton", sans-serif' }}>
          {done ? 'DONE' : display}
        </div>
      </div>

      {/* Progress bar */}
      <div className="h-[3px] bg-[#f5f3ee]/15">
        <div className="h-full bg-[#f5f3ee] transition-[width] duration-1000 ease-linear" style={{ width: `${progress}%` }} />
      </div>

      {/* Controls */}
      <div className="flex items-stretch border-t border-[#f5f3ee]/20">
        {!done ? (
          <>
            <button
              onClick={() => setRunning(r => !r)}
              className="flex-1 py-2 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
            >
              {running
                ? <><Icon name="Pause" size={12} fill="currentColor" /><span className="text-[10px] font-bold uppercase tracking-[0.2em]">PAUSE</span></>
                : <><Icon name="Play" size={12} fill="currentColor" /><span className="text-[10px] font-bold uppercase tracking-[0.2em]">RESUME</span></>
              }
            </button>
            <button
              onClick={reset}
              className="flex-1 py-2 border-l border-[#f5f3ee]/20 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
            >
              <Icon name="RefreshCw" size={12} />
              <span className="text-[10px] font-bold uppercase tracking-[0.2em]">RESET</span>
            </button>
          </>
        ) : (
          <button
            onClick={reset}
            className="flex-1 py-2 hover:bg-[#f5f3ee]/10 active:scale-95 transition flex items-center justify-center gap-1.5"
          >
            <Icon name="RefreshCw" size={12} />
            <span className="text-[10px] font-bold uppercase tracking-[0.2em]">GO AGAIN</span>
          </button>
        )}
      </div>
    </div>
  );
}
